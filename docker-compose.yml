services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      - PORT=3000
      - CORS_ORIGIN=*
      - DATA_DIR=/data
    volumes:
      - app-data:/data
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  app-data:
