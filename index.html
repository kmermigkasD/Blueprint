                        {quarterlyData.quarters.map((q, qi) => (
                          <div key={qi} className="quarter-header" style={{gridColumn: qi + 1, gridRow: 1}}>
                            <span>{q.label}</span>
                            <span className="q-count">{q.projects.length}</span>
                          </div>
                        ))}
                        {quarterlyData.blocks.map((block) => {
                          const {project: p, startQi, endQi, leftPct, widthPct, lane, startDate, endDate, startsBeforeWindow, endsAfterWindow, ghostTrackKeys} = block;
                          const parentStatus = CP.getProjectStatus(p);
                          const parentPct = CP.getPercentComplete(p);
                          const gTracks = ghostTrackKeys || [];
                          const allStatuses = [parentStatus];
                          const allPcts = [parentPct];
                          for (const tk of gTracks) {
                            allStatuses.push(CP.getSplitStatus(splitStatuses, p.id, tk));
                            allPcts.push(CP.getSplitPercentComplete(splitStatuses, p.id, tk));
                          }
                          const pStatus = allStatuses.includes('in_progress') ? 'in_progress' : allStatuses.includes('paused') ? 'paused' : 'not_started';
                          const aggPct = Math.round(allPcts.reduce((a, b) => a + b, 0) / allPcts.length);
                          const cls = ['q-block',
                            pStatus === 'in_progress' ? 'in-progress' : '',
                            pStatus === 'paused' ? 'paused' : '',
                            endsAfterWindow ? 'continues-right' : '',
                            startsBeforeWindow ? 'continues-left' : '',
                          ].filter(Boolean).join(' ');
                          const tipData = { text: p.subTask, x: 0, y: 0 };
                          tipData.start = fmtDate(startDate);
                          tipData.end = fmtDate(endDate);
                          return (
                            <div key={p.id} className="q-cell"
                              style={{gridColumn: `${startQi + 1} / ${endQi + 2}`, gridRow: lane + 2}}>
                              <div className={cls}
                                style={{left: `calc(${leftPct}% + 3px)`, width: `calc(${widthPct}% - 6px)`, background: CP.getBlockBg(p.pillar, pillarColorMap)}}
                                onClick={() => openCommentsSidebar(p.id, p.subTask, { project: p })}
                                onMouseEnter={(e) => setQTip({...tipData, x: e.clientX, y: e.clientY})}
                                onMouseMove={(e) => setQTip(t => t ? {...t, x: e.clientX, y: e.clientY} : t)}
                                onMouseLeave={() => setQTip(null)}>
                                <div className="block-content">
                                  <div className="block-title">{p.subTask}</div>
                                </div>
                                {commentCounts[p.id] && <div className="comment-badge">{IC.chat(12)} {commentCounts[p.id]}</div>}
                                {pStatus === 'paused' && <div className="pause-overlay">⏸</div>}
                                {(pStatus === 'in_progress' || pStatus === 'paused') && aggPct > 0 && (
                                  <div className="q-progress-bar">
                                    <div className={`q-progress-fill ${pStatus === 'paused' ? 'paused' : ''}`} style={{width: `${aggPct}%`}} />
                                  </div>
                                )}
                              </div>
                            </div>
                          );
                        })}
                        {quarterlyData.blocks.length === 0 && (
                          <div style={{gridColumn:'1/5',gridRow:2,textAlign:'center',padding:'48px',color:'var(--text2)',fontSize:12}}>No roadmap projects in the current 4 quarters</div>
                        )}
                      </div>
                    );
                  })()}
                </div>
                {qTip && <div className="q-tip" style={{left: qTip.x + 12, top: qTip.y - 40}}>
                  <div>{qTip.text}</div>
                  <div style={{fontSize:10,fontWeight:400,color:'var(--text2)',marginTop:3}}>
                    {qTip.end ? `${qTip.start} \u2192 ${qTip.end}` : qTip.start}
                  </div>
                </div>}
                </>
              )}
              {/* Delivery content */}
              {activeModal === 'delivery' && (() => {
                const isListMode = deliveryViewMode === 'list';
                const visibleCols = isListMode
                  ? deliveryData.columns.slice(deliveryListPage * 2, deliveryListPage * 2 + 2)
                  : deliveryData.columns;
                const listGridStyle = isListMode ? {
                  gridTemplateColumns: visibleCols.length === 1 ? '1fr' : 'repeat(2, 1fr)',
                  maxWidth: visibleCols.length === 1 ? '50%' : undefined,
                  margin: visibleCols.length === 1 ? '0 auto' : undefined,
                } : undefined;
                return (
                <div className="delivery-body" style={listGridStyle}>
                  {visibleCols.map((col, ci) => (
                    <div key={col.label} className="delivery-column">
                      <div className="delivery-col-header">
                        <span>{col.label}</span>
                        <span className="d-count">{col.items.length}</span>
                      </div>
                      {!isListMode ? (
                        <div className="delivery-masonry-scroll">
                          <div className="delivery-masonry" style={{height: col.containerHeight || 100}}>
                            {col.items.length === 0 && (
                              <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text2)',fontSize:11}}>
                                No deliveries
                              </div>
                            )}
                            {col.tiles && col.tiles.map((tile, ti) => (
                              <div key={tile.project.id}
                                className="delivery-tile"
                                style={{
                                  background: CP.getBlockBg(tile.project.pillar, pillarColorMap),
                                  top: tile.top,
                                  left: tile.left + '%',
                                  width: `calc(${tile.width}% - ${tile.isWide ? 0 : 2}px)`,
                                  height: tile.height,
                                }}
                                onClick={() => openCommentsSidebar(tile.project.id, tile.project.subTask, { project: tile.project })}
                                title={`${tile.project.subTask}\n${tile.project.pillar || ''}`}>
                                <div className="d-title">{tile.project.subTask}</div>
                                {commentCounts[tile.project.id] && (
                                  <div className="d-meta">{IC.chat(12)} {commentCounts[tile.project.id]}</div>
                                )}
                                {deliverySort === 'default' && isEditor && col.tiles.length > 1 && (
                                  <div className="d-reorder-btns">
                                    {ti > 0 && <button onClick={e => {
                                      e.stopPropagation();
                                      const ids = col.tiles.map(t => String(t.project.id));
                                      [ids[ti - 1], ids[ti]] = [ids[ti], ids[ti - 1]];
                                      saveDeliveryOrder(col.label, ids);
                                    }} title="Move up">▲</button>}
                                    {ti < col.tiles.length - 1 && <button onClick={e => {
                                      e.stopPropagation();
                                      const ids = col.tiles.map(t => String(t.project.id));
                                      [ids[ti], ids[ti + 1]] = [ids[ti + 1], ids[ti]];
                                      saveDeliveryOrder(col.label, ids);
                                    }} title="Move down">▼</button>}
                                  </div>
                                )}
                              </div>
                            ))}
                          </div>
                        </div>
                      ) : (
                        <div className="d-list-scroll">
                          {col.items.length === 0 && (
                            <div style={{padding:'24px 0',textAlign:'center',color:'var(--text2)',fontSize:12}}>
                              No deliveries
                            </div>
                          )}
                          {col.items.map((item, ii) => {
                            const p = item.project;
                            return (
                              <div key={p.id} className="d-list-item"
                                onClick={() => openCommentsSidebar(p.id, p.subTask, { project: p })}
                                title={`${p.subTask}\n${p.pillar || ''} · ${item.totalSprints} sprints`}>
                                <span className="d-list-dot" style={{background: CP.getBlockBg(p.pillar, pillarColorMap)}} />
                                <span className="d-list-name">{p.subTask}</span>
                                <span className="d-list-effort">{item.totalSprints}sp</span>
                                {commentCounts[p.id] && (
                                  <span className="d-list-comment">{IC.chat(12)} {commentCounts[p.id]}</span>
                                )}
                                {deliverySort === 'default' && isEditor && col.items.length > 1 && (
                                  <div className="d-list-reorder">
                                    {ii > 0 && <button onClick={e => {
                                      e.stopPropagation();
                                      const ids = col.items.map(it => String(it.project.id));
                                      [ids[ii - 1], ids[ii]] = [ids[ii], ids[ii - 1]];
                                      saveDeliveryOrder(col.label, ids);
                                    }} title="Move up">▲</button>}
                                    {ii < col.items.length - 1 && <button onClick={e => {
                                      e.stopPropagation();
                                      const ids = col.items.map(it => String(it.project.id));
                                      [ids[ii], ids[ii + 1]] = [ids[ii + 1], ids[ii]];
                                      saveDeliveryOrder(col.label, ids);
                                    }} title="Move down">▼</button>}
                                  </div>
                                )}
                              </div>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  ))}
                </div>
                );
              })()}
            </div>
          </div>
        </div>
      )}

      {/* Sprint Override Inline Editor Popover */}
      {sprintEditor && (() => {
        const proj = projectById[sprintEditor.projectId];
        if (!proj) return null;
        return (
          <div className="sprint-editor-popover" onClick={e => e.stopPropagation()} style={{position:'fixed', left: Math.min(sprintEditor.x, window.innerWidth - 290), top: Math.min(sprintEditor.y, window.innerHeight - 250), zIndex:9999, background:'var(--surface1)', border:'1px solid var(--border)', borderRadius:8, boxShadow:'0 4px 16px rgba(0,0,0,0.4)', padding:'12px 14px', minWidth: 260}}>
            <div style={{fontSize:12, fontWeight:600, color:'var(--text1)', marginBottom:10, display:'flex', justifyContent:'space-between', alignItems:'center'}}>
              <span style={{overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', maxWidth:200}}>Sprint Overrides</span>
              <span onClick={() => setSprintEditor(null)} style={{cursor:'pointer', fontSize:14, color:'var(--text2)', padding:'0 2px'}}>{IC.close(14)}</span>
            </div>
            <div style={{display:'grid', gridTemplateColumns:'60px 45px 14px 65px 18px', gap:'4px 6px', alignItems:'center'}}>
              {['backend', 'frontend', 'natives'].map(d => {
                const tshirt = proj[d] || '';
                const tshirtSp = tshirt ? CP.sizeToSprints(tshirt, sizeMap) : 0;
                const currentOverride = (proj.sprintOverrides || {})[d];
                const hasOverride = currentOverride != null;
                return (
                  <React.Fragment key={d}>
                    <label style={{fontSize:11, color:'var(--text2)', textTransform:'capitalize'}}>{d === 'backend' ? 'BE' : d === 'frontend' ? 'FE' : 'Natives'}</label>
                    <span style={{fontSize:10, color:'var(--text2)', textAlign:'center'}}>{tshirt ? `${tshirt}=${tshirtSp}` : '—'}</span>
                    <span style={{fontSize:10, color:'var(--text2)', textAlign:'center'}}>→</span>
                    <input type="number" min="0" step="0.5"
                      value={hasOverride ? currentOverride : ''}
                      placeholder={tshirtSp || '—'}
                      style={{width:60, padding:'3px 5px', fontSize:11, background:'var(--surface2)', border:'1px solid var(--border)', borderRadius:4, color: hasOverride ? 'var(--text1)' : 'var(--text2)'}}
                      onChange={e => {
                        const val = e.target.value;
                        const newOverrides = { ...(proj.sprintOverrides || {}) };
                        if (val === '' || val == null) {
                          delete newOverrides[d];
                        } else {
                          newOverrides[d] = parseFloat(val) || 0;
                        }
                        const cleanOverrides = Object.keys(newOverrides).length > 0 ? newOverrides : undefined;
                        const updated = currentData.map(p => p.id === proj.id ? { ...p, sprintOverrides: cleanOverrides } : p);
                        setVerticalData(prev => ({ ...prev, [activeVertical]: updated }));
                        debouncedSaveProjects(activeVertical, updated);
                      }}
                    />
                    <span style={{fontSize:9, color:'var(--text2)'}}>sp</span>
                  </React.Fragment>
                );
              })}
            </div>
          </div>
        );
      })()}

      {settingsModal && (() => {
        const { projectId, projectName, homeTrack, isGhost, ghostTargetTrack } = settingsModal;
        const proj = projectById[projectId];
        if (!proj) return null;
        const activeTab = settingsModal.tab || 'general';
        const fullSprints = projectSprints(proj);
        const existingSplits = splits[projectId] || {};
        const otherTracks = TRACKS.filter(t => t.key !== homeTrack);

        // Split tab state (preserved across tab switches)
        const targetTrack = settingsModal._targetTrack || otherTracks[0]?.key;
        const splitSizing = settingsModal._sizing || existingSplits[targetTrack] || { backend: 0, frontend: 0, natives: 0 };
        const setSplitSizing = (v) => setSettingsModal(prev => ({ ...prev, _sizing: typeof v === 'function' ? v(prev._sizing || existingSplits[prev._targetTrack || otherTracks[0]?.key] || { backend:0,frontend:0,natives:0 }) : v }));

        // Split overflow calculations
        const allSplitOut = { backend:0, frontend:0, natives:0 };
        for (const [tk, sz] of Object.entries(existingSplits)) {
          if (tk === targetTrack) continue;
          allSplitOut.backend += (sz.backend||0); allSplitOut.frontend += (sz.frontend||0);
          allSplitOut.natives += (sz.natives||0);
        }
        const totalOut = {
          backend: allSplitOut.backend + (splitSizing.backend||0), frontend: allSplitOut.frontend + (splitSizing.frontend||0),
          natives: allSplitOut.natives + (splitSizing.natives||0),
        };
        const remaining = {
          backend: fullSprints.backend - totalOut.backend, frontend: fullSprints.frontend - totalOut.frontend,
          natives: fullSprints.natives - totalOut.natives,
        };
        const hasOverSplit = remaining.backend < 0 || remaining.frontend < 0 || remaining.natives < 0;
        const homeLabel = TRACKS.find(t => t.key === homeTrack)?.label || homeTrack;

        // General tab helpers — ghost-aware
        const currentStatus = isGhost
          ? CP.getSplitStatus(splitStatuses, projectId, ghostTargetTrack)
          : CP.getProjectStatus(proj);
        const currentPct = isGhost
          ? CP.getSplitPercentComplete(splitStatuses, projectId, ghostTargetTrack)
          : CP.getPercentComplete(proj);
        const updateProjectFields = (updates) => {
          const updated = currentData.map(p => p.id === projectId ? { ...p, ...updates } : p);
          setVerticalData(prev => ({ ...prev, [activeVertical]: updated }));
          debouncedSaveProjects(activeVertical, updated);
        };
        const setStatus = (newStatus) => {
          if (isGhost) {
            const newPct = newStatus === 'not_started' ? 0 : currentPct;
            saveSplitStatus(projectId, ghostTargetTrack, newStatus, newPct);
          } else {
            const updates = { status: newStatus, inProgress: (newStatus === 'in_progress' || newStatus === 'paused') };
            if (newStatus === 'not_started') { updates.percentComplete = 0; }
            updateProjectFields(updates);
          }
        };
        const setPct = (val) => {
          const clamped = Math.max(0, Math.min(100, typeof val === 'number' ? val : (parseInt(val) || 0)));
          if (isGhost) {
            saveSplitStatus(projectId, ghostTargetTrack, currentStatus, clamped);
          } else {
            updateProjectFields({ percentComplete: clamped });
          }
        };

        return (
          <div className="split-modal-overlay" onClick={() => setSettingsModal(null)}>
            <div className="split-modal" onClick={e => e.stopPropagation()} style={{minWidth: 380}}>
              <h3 style={{display:'flex',alignItems:'center',gap:6}}>{IC.gear(14)} {projectName} {isGhost && <span style={{fontSize:11,color:'var(--text2)',fontWeight:400}}>(Split)</span>}</h3>

              {/* Tab bar */}
              <div className="settings-tabs">
                <button className={`settings-tab ${activeTab === 'general' ? 'active' : ''}`}
                  onClick={() => setSettingsModal(prev => ({...prev, tab: 'general'}))}>General</button>
                {!isGhost && <button className={`settings-tab ${activeTab === 'split' ? 'active' : ''}`}
                  onClick={() => setSettingsModal(prev => ({...prev, tab: 'split'}))}>Split</button>}
              </div>

              {/* ── General Tab ── */}
              {activeTab === 'general' && (
                <div>
                  <div style={{fontSize:11, color:'var(--text2)', marginBottom:8, fontWeight:600}}>STATUS</div>
                  <div className="status-radio-group">
                    {[
                      { value: 'not_started', label: 'Not Started', desc: 'Work has not begun', icon: '○' },
                      { value: 'in_progress', label: 'In Progress', desc: 'Actively being worked on', icon: '●' },
                      { value: 'paused', label: 'Paused', desc: 'Work temporarily halted', icon: '⏸' },
                    ].map(opt => (
                      <label key={opt.value} className={`status-radio-option ${currentStatus === opt.value ? 'selected' : ''}`}>
                        <input type="radio" name="project-status" value={opt.value}
                          checked={currentStatus === opt.value} onChange={() => setStatus(opt.value)} />
                        <div>
                          <div className="status-radio-label">{opt.icon} {opt.label}</div>
                          <div className="status-radio-desc">{opt.desc}</div>
                        </div>
                      </label>
                    ))}
                  </div>
                  {(currentStatus === 'in_progress' || currentStatus === 'paused') && (
                    <div className="percent-field">
                      <label>% Complete</label>
                      <NumInput min="0" max="100" integer value={currentPct}
                        onCommit={v => setPct(v)} />
                      <span style={{fontSize:11, color:'var(--text2)'}}>%</span>
                      <div style={{flex:1, height:6, background:'rgba(0,0,0,0.2)', borderRadius:3, overflow:'hidden', marginLeft:8}}>
                        <div style={{height:'100%', width:`${currentPct}%`, background: currentStatus === 'paused' ? '#fdcb6e' : 'var(--green)', transition:'width 0.2s', borderRadius:3}} />
                      </div>
                    </div>
                  )}
                  {/* Sprint Overrides Section */}
                  {!isGhost && (
                    <div style={{marginTop: 16}}>
                      <div style={{fontSize:11, color:'var(--text2)', marginBottom:8, fontWeight:600}}>
                        SPRINT OVERRIDES
                        <span style={{fontWeight:400, marginLeft:6}}>(leave empty to use T-shirt estimate)</span>
                      </div>
                      {['backend', 'frontend', 'natives'].map(d => {
                        const tshirt = proj[d] || '';
                        const tshirtSp = tshirt ? CP.sizeToSprints(tshirt, sizeMap) : 0;
                        const currentOverride = (proj.sprintOverrides || {})[d];
                        const hasOverride = currentOverride != null;
                        return (
                          <div key={d} style={{display:'flex', alignItems:'center', gap:8, marginBottom:6}}>
                            <label style={{width:70, fontSize:12, color:'var(--text2)', textTransform:'capitalize'}}>{d === 'backend' ? 'Backend' : d === 'frontend' ? 'Frontend' : 'Natives'}</label>
                            <span style={{width:55, fontSize:11, color:'var(--text2)', textAlign:'center'}}>
                              {tshirt ? `${tshirt} (${tshirtSp}sp)` : '—'}
                            </span>
                            <span style={{fontSize:11, color:'var(--text2)'}}>→</span>
                            <input type="number" min="0" step="0.5"
                              value={hasOverride ? currentOverride : ''}
                              placeholder={tshirtSp || '—'}
                              style={{width:70, padding:'4px 6px', fontSize:12, background:'var(--surface2)', border:'1px solid var(--border)', borderRadius:4, color: hasOverride ? 'var(--text1)' : 'var(--text2)'}}
                              onChange={e => {
                                const val = e.target.value;
                                const newOverrides = { ...(proj.sprintOverrides || {}) };
                                if (val === '' || val == null) {
                                  delete newOverrides[d];
                                } else {
                                  newOverrides[d] = parseFloat(val) || 0;
                                }
                                const cleanOverrides = Object.keys(newOverrides).length > 0 ? newOverrides : undefined;
                                updateProjectFields({ sprintOverrides: cleanOverrides });
                              }}
                            />
                            <span style={{fontSize:10, color:'var(--text2)'}}>sp</span>
                          </div>
                        );
                      })}
                    </div>
                  )}

                  <div className="split-modal-actions" style={{marginTop: 16}}>
                    <button className="btn-cancel" onClick={() => setSettingsModal(null)}>Close</button>
                  </div>
                </div>
              )}

              {/* ── Split Tab ── */}
              {activeTab === 'split' && (
                <div>
                  <div style={{fontSize:11,color:'var(--text2)',marginBottom:8}}>
                    Full sizing: B{fullSprints.backend} F{fullSprints.frontend} N{fullSprints.natives} = {fullSprints.total}sp
                  </div>
                  {Object.keys(existingSplits).length > 0 && (
                    <div className="split-existing">
                      <div style={{fontSize:10,color:'var(--text2)',marginBottom:4,fontWeight:600}}>EXISTING SPLITS</div>
                      {Object.entries(existingSplits).map(([tk, sz]) => {
                        const tLabel = TRACKS.find(t => t.key === tk)?.label || tk;
                        const total = (sz.backend||0) + (sz.frontend||0) + (sz.natives||0);
                        return (
                          <div key={tk} className="split-existing-item">
                            <span>{tLabel}: B{sz.backend||0} F{sz.frontend||0} N{sz.natives||0} = {total}sp</span>
                            <button className="btn-sm" style={{fontSize:10,padding:'2px 6px',background:'var(--red)',color:'white',border:'none',borderRadius:3,cursor:'pointer'}}
                              onClick={() => { removeSplit(projectId, tk); setSettingsModal(prev => ({...prev})); }}>Remove</button>
                          </div>
                        );
                      })}
                    </div>
                  )}
                  <div className="split-modal-fields">
                    <div className="split-field-row">
                      <label>Target Lane</label>
                      <select value={targetTrack} onChange={e => {
                        const newTrack = e.target.value;
                        setSettingsModal(prev => ({ ...prev, _targetTrack: newTrack, _sizing: existingSplits[newTrack] || { backend:0, frontend:0, natives:0 } }));
                      }}>
                        {otherTracks.map(t => <option key={t.key} value={t.key}>{t.label}</option>)}
                      </select>
                    </div>
                    {['backend','frontend','natives'].map(d => {
                      const max = fullSprints[d] - allSplitOut[d];
                      const isOver = (splitSizing[d]||0) > max;
                      return (
                        <div key={d} className="split-field-row">
                          <label>{d.charAt(0).toUpperCase()+d.slice(1)}</label>
                          <NumInput min="0" max={max} step="0.5" value={splitSizing[d] || 0}
                            style={isOver ? {borderColor:'var(--red)',color:'var(--red)'} : {}}
                            onCommit={v => setSplitSizing(prev => ({...prev, [d]: v}))} />
                          <span style={{fontSize:10,color: isOver ? 'var(--red)' : 'var(--text2)'}}> / {max}sp max</span>
                        </div>
                      );
                    })}
                  </div>
                  <div style={{fontSize:11,margin:'8px 0',padding:'6px 8px',borderRadius:6,background: hasOverSplit ? 'rgba(225,112,85,0.15)' : 'rgba(0,184,148,0.1)',border: `1px solid ${hasOverSplit ? 'var(--red)' : 'var(--green)'}`}}>
                    Remaining in <strong>{homeLabel}</strong>: B{remaining.backend} F{remaining.frontend} N{remaining.natives}
                    {hasOverSplit && <span style={{color:'var(--red)',fontWeight:600}}> — over-split!</span>}
                  </div>
                  <div className="split-modal-actions">
                    <button className="btn-cancel" onClick={() => setSettingsModal(null)}>Cancel</button>
                    <button className="btn-save" onClick={() => {
                      const finalTarget = settingsModal._targetTrack || otherTracks[0]?.key;
                      const finalSizing = settingsModal._sizing || existingSplits[finalTarget] || { backend:0,frontend:0,natives:0 };
                      saveSplit(projectId, finalTarget, finalSizing);
                      setSettingsModal(null);
                    }}>Save Split</button>
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      })()}

      {isAdmin && <NotesSidebar
        isOpen={notesSidebarOpen}
        onClose={() => setNotesSidebarOpen(false)}
        getAuthHeaders={getAuthHeaders}
        verticalData={verticalData}
        verticals={verticals}
        initialNote={initialNoteData}
        onInitialNoteConsumed={() => setInitialNoteData(null)}
      />}

      <CommentsSidebar
        sidebar={commentsSidebar}
        comments={sidebarComments}
        loading={commentsLoading}
        onClose={closeCommentsSidebar}
        onAddComment={addComment}
        onAddReply={addReply}
        onDeleteComment={deleteComment}
        authUser={authUser}
        sizeMap={sizeMap}
        splits={splits}
        trackOverflow={trackOverflow}
        effectiveTrackCapacity={effectiveTrackCapacity}
        trackUsed={trackUsed}
        tracks={TRACKS}
        pillarColorMap={pillarColorMap}
        projectAlerts={commentsSidebar ? verticalAlerts.filter(a => a.projectId != null && String(a.projectId) === String(commentsSidebar.projectId)) : []}
        onAddProjectAlert={(text, level) => commentsSidebar && addAlert(activeVertical, text, level, commentsSidebar.projectId)}
        onDeleteAlert={(alertId) => deleteAlert(activeVertical, alertId)}
        onEditAlert={(alertId, updates) => editAlert(activeVertical, alertId, updates)}
        onTogglePromote={(alertId, promoted) => toggleAlertPromoted(activeVertical, alertId, promoted)}
        isEditor={isEditor}
        onUpdateDescription={(projectId, desc) => {
          const updated = (verticalData[activeVertical] || []).map(p =>
            p.id === projectId ? { ...p, description: desc } : p
          );
          setVerticalData(prev => ({ ...prev, [activeVertical]: updated }));
          debouncedSaveProjects(activeVertical, updated);
        }}
        isAdmin={isAdmin}
        onAddNote={openNotesSidebarWithNote}
        getAuthHeaders={getAuthHeaders}
      />

      {/* Snapshot Modal */}
      {showEditorPanel && (() => {
        const allVerticalKeys = verticals.map(v => v.key);
        const saveEditors = async (editors) => {
          try {
            const resp = await fetch(`${API_URL}/api/editors`, {
              method: 'POST', headers: getAuthHeaders(),
              body: JSON.stringify({ editors }),
            });
            if (!resp.ok) { alert('Failed to save: ' + ((await resp.json()).error || resp.status)); return; }
            const data = await resp.json();
            setEditorList(data.editors);
          } catch (e) { alert('Error: ' + e.message); }
        };
        return (
        <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.7)',backdropFilter:'blur(8px)',WebkitBackdropFilter:'blur(8px)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center'}}
          onClick={() => setShowEditorPanel(false)}>
          <div style={{background:'rgba(22,24,32,0.92)',backdropFilter:'blur(40px)',WebkitBackdropFilter:'blur(40px)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:16,padding:28,width:520,maxHeight:'80vh',overflow:'auto',boxShadow:'0 24px 64px rgba(0,0,0,0.6)'}}
            onClick={e => e.stopPropagation()}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
              <h3 style={{margin:0,fontSize:16,fontWeight:600,color:'var(--text1)'}}>Editor Access Management</h3>
              <button onClick={() => setShowEditorPanel(false)}
                style={{background:'none',border:'none',color:'var(--text2)',fontSize:18,cursor:'pointer'}}>{IC.close(14)}</button>
            </div>

            {accessRequests.length > 0 && (
              <div style={{marginBottom:16,padding:12,background:'rgba(253,203,110,0.08)',border:'1px solid rgba(253,203,110,0.25)',borderRadius:8}}>
                <div style={{fontSize:12,fontWeight:600,color:'var(--yellow)',marginBottom:8}}>
                  Pending Requests ({accessRequests.length})
                </div>
                {accessRequests.map(r => (
                  <div key={r.email} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid var(--border)'}}>
                    <div>
                      <div style={{fontSize:12,color:'var(--text1)',fontWeight:500}}>{r.name || r.email}</div>
                      {r.name && <div style={{fontSize:10,color:'var(--text2)'}}>{r.email}</div>}
                      <div style={{fontSize:9,color:'var(--text2)'}}>
                        {(() => {
                          const mins = Math.floor((Date.now() - new Date(r.requestedAt).getTime()) / 60000);
                          if (mins < 1) return 'just now';
                          if (mins < 60) return `${mins}m ago`;
                          const hrs = Math.floor(mins / 60);
                          if (hrs < 24) return `${hrs}h ago`;
                          return `${Math.floor(hrs / 24)}d ago`;
                        })()}
                      </div>
                    </div>
                    <div style={{display:'flex',gap:4}}>
                      <button onClick={async () => {
                        try {
                          const newEditor = {email: r.email, verticals: allVerticalKeys};
                          await saveEditors([...editorList, newEditor]);
                          await fetch(`${API_URL}/api/editors/request`, {
                            method: 'DELETE', headers: getAuthHeaders(),
                            body: JSON.stringify({ email: r.email }),
                          });
                          setAccessRequests(prev => prev.filter(x => x.email !== r.email));
                        } catch (e) { alert('Error: ' + e.message); }
                      }} style={{padding:'2px 8px',background:'rgba(0,184,148,0.15)',color:'#00b894',border:'1px solid rgba(0,184,148,0.3)',borderRadius:4,fontSize:10,fontWeight:600,cursor:'pointer'}}>
                        Accept
                      </button>
                      <button onClick={async () => {
                        try {
                          await fetch(`${API_URL}/api/editors/request`, {
                            method: 'DELETE', headers: getAuthHeaders(),
                            body: JSON.stringify({ email: r.email }),
                          });
                          setAccessRequests(prev => prev.filter(x => x.email !== r.email));
                        } catch (e) { alert('Error: ' + e.message); }
                      }} style={{padding:'2px 8px',background:'rgba(225,112,85,0.1)',color:'var(--red)',border:'1px solid rgba(225,112,85,0.2)',borderRadius:4,fontSize:10,fontWeight:600,cursor:'pointer'}}>
                        Dismiss
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* Add editor input */}
            <div style={{marginBottom:16}}>
              <div style={{fontSize:12,color:'var(--text2)',marginBottom:6}}>Add editor (only @novibet.com)</div>
              <form onSubmit={async (e) => {
                e.preventDefault();
                const input = e.target.elements['new-editor-email'];
                const email = input.value.trim().toLowerCase();
                if (!email || !email.endsWith('@novibet.com')) { alert('Must be @novibet.com'); return; }
                if (editorList.some(ed => ed.email === email)) { alert('Already in list'); return; }
                await saveEditors([...editorList, {email, verticals: allVerticalKeys}]);
                input.value = '';
              }} style={{display:'flex',gap:6}}>
                <input name="new-editor-email" type="email" placeholder="user@novibet.com"
                  style={{flex:1,padding:'6px 10px',background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:8,color:'var(--text1)',fontSize:12}} />
                <button type="submit"
                  style={{padding:'6px 14px',background:'linear-gradient(135deg, var(--accent), var(--accent2))',color:'#fff',border:'none',borderRadius:6,fontSize:11,fontWeight:600,cursor:'pointer'}}>

                </button>
              </form>
            </div>

            {/* Editor tags with vertical toggles */}

              {editorList.map(ed => (
                <div key={ed.email} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 10px',background:'rgba(255,255,255,0.03)',borderRadius:10,border:'1px solid rgba(255,255,255,0.06)'}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
                      <span style={{fontSize:12,color:'var(--text1)',fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{ed.email.replace('@novibet.com','')}</span>

                        style={{background:'none',border:'none',color:'var(--red)',fontSize:14,cursor:'pointer',padding:0,lineHeight:1,opacity:0.6}}
                        title="Remove editor">{IC.close(14)}</button>
                    </div>
                    <div style={{display:'flex',gap:3,flexWrap:'wrap'}}>
                      {verticals.map(v => {
                        const active = ed.verticals.includes('all') || ed.verticals.includes(v.key);
                        return (
                          <button key={v.key} onClick={() => {
                            let newVerticals;
                            if (ed.verticals.includes('all')) {

                              newVerticals = allVerticalKeys.filter(k => k !== v.key);
                            } else if (active) {
                              newVerticals = ed.verticals.filter(k => k !== v.key);
                            } else {
                              newVerticals = [...ed.verticals, v.key];
                              // If all selected, keep as explicit list (no "all" needed)
                            }
                            if (newVerticals.length === 0) newVerticals = [v.key]; // Can't remove all
                            const updated = editorList.map(x => x.email === ed.email ? {...x, verticals: newVerticals} : x);
                            saveEditors(updated);

                              background: active ? `${v.color}22` : 'transparent',

              {editorList.length === 0 && (

            <div style={{marginTop:16,fontSize:11,color:'var(--text2)'}}>

              <div style={{fontSize:11,color:'var(--text2)',marginBottom:8}}>
                Create custom verticals. Admin-only verticals are visible only to you.
              </div>
              <form onSubmit={async (e) => {
                e.preventDefault();
                const form = e.target;
                const label = form.elements['cv-label'].value.trim();
                const key = label.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '').slice(0, 30);
                if (!key || key.length < 2) { alert('Name too short'); return; }
                const color = form.elements['cv-color'].value;
                const icon = form.elements['cv-icon'].value.trim();
                const adminOnly = form.elements['cv-admin-only'].checked;
                try {
                  const res = await fetch(`${API_URL}/api/custom-verticals`, {
                    method: 'POST', headers: getAuthHeaders(),
                    body: JSON.stringify({ key, label, color, icon, adminOnly }),
                  });
                  const data = await res.json();
                  if (!res.ok) { alert(data.error || 'Failed'); return; }
                  form.reset();
                  form.elements['cv-color'].value = '#636e72';
                  await refreshVerticals();
                } catch (err) { alert('Error: ' + err.message); }
              }} style={{display:'flex',flexDirection:'column',gap:6,marginBottom:12}}>
                <div style={{display:'flex',gap:6}}>
                  <input name="cv-label" placeholder="Name (e.g. Marketing)" required
                    style={{flex:1,padding:'6px 10px',background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:8,color:'var(--text1)',fontSize:12}} />
                </div>
                <div style={{display:'flex',gap:6,alignItems:'center'}}>
                  <input name="cv-color" type="color" defaultValue="#636e72"
                    style={{width:36,height:28,border:'1px solid rgba(255,255,255,0.08)',borderRadius:6,cursor:'pointer',background:'transparent'}} />
                  <input name="cv-icon" placeholder="Icon emoji" maxLength={4}
                    style={{width:60,padding:'6px 10px',background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:8,color:'var(--text1)',fontSize:12,textAlign:'center'}} />
                  <label style={{display:'flex',alignItems:'center',gap:4,fontSize:11,color:'var(--text2)',cursor:'pointer',whiteSpace:'nowrap'}}>
                    <input name="cv-admin-only" type="checkbox" /> Admin only
                  </label>
                  <button type="submit"
                    style={{padding:'6px 14px',background:'linear-gradient(135deg, var(--accent), var(--accent2))',color:'#fff',border:'none',borderRadius:6,fontSize:11,fontWeight:600,cursor:'pointer',whiteSpace:'nowrap'}}>
                    Create
                  </button>
                </div>
              </form>
              <div style={{display:'flex',flexDirection:'column',gap:4}}>
                {verticals.filter(v => !v.builtIn).map(v => (
                  <div key={v.key} style={{display:'flex',alignItems:'center',justifyContent:'space-between',
                    padding:'6px 10px',background:'rgba(255,255,255,0.03)',borderRadius:8,border:'1px solid rgba(255,255,255,0.06)'}}>
                    <div style={{display:'flex',alignItems:'center',gap:6}}>
                      <span>{v.icon}</span>
                      <span style={{fontSize:12,color:v.color,fontWeight:600}}>{v.label}</span>
                      <span style={{fontSize:9,color:'var(--text2)'}}>({v.key})</span>
                      {v.adminOnly && <span style={{fontSize:9,padding:'1px 4px',background:'rgba(253,203,110,0.15)',
                        color:'#fdcb6e',borderRadius:3,fontWeight:600}}>Admin Only</span>}
                    </div>
                    <button onClick={async () => {
                      if (!confirm(`Delete vertical "${v.label}"? This will remove all its data.`)) return;
                      try {
                        const res = await fetch(`${API_URL}/api/custom-verticals/${v.key}`, {
                          method: 'DELETE', headers: getAuthHeaders(),
                        });
                        if (res.ok) {
                          if (activeVertical === v.key) handleVerticalChange('growth');
                          await refreshVerticals();
                        } else {
                          const data = await res.json();
                          alert(data.error || 'Failed');
                        }
                      } catch (err) { alert('Error: ' + err.message); }
                    }} style={{background:'none',border:'none',color:'var(--red, #e17055)',fontSize:14,
                      cursor:'pointer',padding:0,opacity:0.6}} title="Delete vertical">
                      {IC.close(14)}
                    </button>
                  </div>
                ))}
                {verticals.filter(v => !v.builtIn).length === 0 && (
                  <div style={{fontSize:11,color:'var(--text2)',textAlign:'center',padding:8}}>No custom verticals</div>
                )}
              </div>
            </div>
          </div>
        </div>
        );
      })()}

      {showSnapshots && (
        <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.7)',backdropFilter:'blur(8px)',WebkitBackdropFilter:'blur(8px)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center'}}
          onClick={() => setShowSnapshots(false)}>
          <div style={{background:'rgba(22,24,32,0.92)',backdropFilter:'blur(40px)',WebkitBackdropFilter:'blur(40px)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:16,padding:28,width:520,maxHeight:'80vh',overflow:'auto',boxShadow:'0 24px 64px rgba(0,0,0,0.6)'}}
            onClick={e => e.stopPropagation()}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
              <h3 style={{margin:0,fontSize:16,fontWeight:600,color:'var(--text1)'}}>Workspaces</h3>
              <button onClick={() => setShowSnapshots(false)}
                style={{background:'none',border:'none',color:'var(--text2)',fontSize:18,cursor:'pointer'}}>{IC.close(14)}</button>
            </div>

            {/* Masterplan — always first, non-deletable */}
            <div style={{background:'rgba(255,255,255,0.03)',borderRadius:10,padding:'12px 14px',marginBottom:12,
              border: isOnMasterplan ? '1px solid rgba(0,184,148,0.35)' : '1px solid rgba(255,255,255,0.06)'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div>
                  <div style={{display:'flex',alignItems:'center',gap:6}}>
                    <span style={{fontSize:13,fontWeight:700,color:'var(--text1)'}}>Masterplan</span>
                    {isOnMasterplan && (
                      <span style={{fontSize:9,padding:'2px 6px',background:'rgba(0,184,148,0.12)',color:'#00b894',borderRadius:9999,fontWeight:600}}>Active</span>
                    )}
                  </div>
                  <div style={{fontSize:10,color:'var(--text2)',marginTop:2}}>The live roadmap. Only the Masterplan can be signed off.</div>
                </div>
                {!isOnMasterplan && (
                  <button onClick={switchToMasterplan}
                    style={{padding:'4px 12px',background:'#00b894',color:'#fff',border:'none',borderRadius:8,fontSize:10,fontWeight:600,cursor:'pointer'}}>
                    Open
                  </button>
                )}
              </div>
            </div>

            {/* Create New Snapshot */}
            {isEditor && (
            <div style={{background:'rgba(255,255,255,0.03)',borderRadius:10,padding:14,marginBottom:12,border:'1px solid rgba(255,255,255,0.06)'}}>
              <div style={{fontSize:11,fontWeight:600,color:'var(--text2)',marginBottom:8,textTransform:'uppercase'}}>
                Create Snapshot {!isOnMasterplan && <span style={{fontWeight:400,textTransform:'none'}}>(from {activeWorkspace.name})</span>}
              </div>
              <input value={snapshotName} onChange={e => setSnapshotName(e.target.value)}
                placeholder="Snapshot name (e.g., Sprint 5 Plan)"
                style={{width:'100%',padding:'6px 10px',background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:8,color:'var(--text1)',fontSize:12,marginBottom:6,boxSizing:'border-box'}} />
              <input value={snapshotDesc} onChange={e => setSnapshotDesc(e.target.value)}
                placeholder="Description (optional)"
                style={{width:'100%',padding:'6px 10px',background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:8,color:'var(--text1)',fontSize:12,marginBottom:8,boxSizing:'border-box'}} />
              <button onClick={saveSnapshot} disabled={!snapshotName.trim() || snapshotLoading}
                style={{padding:'6px 16px',background:'linear-gradient(135deg, var(--accent), var(--accent2))',color:'#fff',border:'none',borderRadius:8,fontSize:11,fontWeight:600,cursor:snapshotName.trim()?'pointer':'default',opacity:snapshotName.trim()?1:0.5}}>
                {snapshotLoading ? 'Creating...' : 'Create Snapshot'}
              </button>
            </div>
            )}

            {/* Snapshot List */}
            <div style={{fontSize:11,fontWeight:600,color:'var(--text2)',marginBottom:8,textTransform:'uppercase'}}>
              Snapshots ({snapshots.length})
            </div>
            {snapshots.length === 0 ? (
              <div style={{textAlign:'center',padding:20,color:'var(--text2)',fontSize:12}}>
                No snapshots yet. Create one above to get started.
              </div>
            ) : (
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {snapshots.map(s => (
                  <div key={s.id} style={{background:'rgba(255,255,255,0.03)',borderRadius:10,padding:'12px 14px',
                    border: activeWorkspace.type === 'snapshot' && activeWorkspace.id === s.id ? '1px solid rgba(116,185,255,0.35)' : '1px solid rgba(255,255,255,0.06)'}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                      <div>
                        <div style={{display:'flex',alignItems:'center',gap:6}}>
                          <span style={{fontSize:13,fontWeight:600,color:'var(--text1)'}}>{s.name}</span>
                          {activeWorkspace.type === 'snapshot' && activeWorkspace.id === s.id && (
                            <span style={{fontSize:9,padding:'2px 6px',background:'rgba(116,185,255,0.12)',color:'#74b9ff',borderRadius:8,fontWeight:600}}>Active</span>
                          )}
                        </div>
                        {s.description && <div style={{fontSize:11,color:'var(--text2)',marginTop:2}}>{s.description}</div>}
                        <div style={{fontSize:10,color:'var(--text2)',marginTop:4}}>
                          {new Date(s.createdAt).toLocaleDateString()} {new Date(s.createdAt).toLocaleTimeString()}
                          {' · '}{s.projectCount} projects · by {s.createdBy?.split('@')[0]}
                        </div>
                      </div>
                      <div style={{display:'flex',gap:6}}>
                        {!(activeWorkspace.type === 'snapshot' && activeWorkspace.id === s.id) && (
                          <button onClick={() => switchToSnapshot(s.id, s.name)}
                            style={{padding:'4px 12px',background:'#0984e3',color:'#fff',border:'none',borderRadius:8,fontSize:10,fontWeight:600,cursor:'pointer'}}>
                            Open
                          </button>
                        )}
                        {isEditor && (
                          <button onClick={() => deleteSnapshot(s.id, s.name)}
                            style={{padding:'4px 12px',background:'rgba(231,76,60,0.08)',color:'#e74c3c',border:'1px solid rgba(231,76,60,0.2)',borderRadius:8,fontSize:10,fontWeight:600,cursor:'pointer'}}>
                            Delete
                          </button>
                        )}
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      )}
    </>
  );
}

const GOOGLE_CLIENT_ID = '487456084105-01l0m47e7up61qb40sf2v7gtjmrp6hqt.apps.googleusercontent.com';
const ALLOWED_DOMAIN = 'novibet.com';
const GOOGLE_AUTH_KEY = 'cp_google_auth';

function decodeJwt(token) {
  try {
    const base64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
    return JSON.parse(atob(base64));
  } catch { return null; }
}

function getStoredGoogleAuth() {
  try {
    const stored = localStorage.getItem(GOOGLE_AUTH_KEY);
    if (!stored) return null;
    const data = JSON.parse(stored);
    if (data.exp && data.exp * 1000 < Date.now() + 300000) {
      localStorage.removeItem(GOOGLE_AUTH_KEY);
      return null;
    }
    if (!data.email || !data.email.endsWith('@' + ALLOWED_DOMAIN)) {
      localStorage.removeItem(GOOGLE_AUTH_KEY);
      return null;
    }
    return data;
  } catch { return null; }
}

function AuthGate() {
  const [user, setUser] = useState(() => getStoredGoogleAuth());
  const [error, setError] = useState('');
  const googleBtnRef = useRef(null);

  useEffect(() => {
    if (user) return;
    const initGoogle = () => {
      if (!window.google?.accounts?.id) {
        setTimeout(initGoogle, 200);
        return;
      }
      window.google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: handleGoogleResponse,
        auto_select: true,
      });
      if (googleBtnRef.current) {
        window.google.accounts.id.renderButton(googleBtnRef.current, {
          theme: 'filled_black',
          size: 'large',
          width: 300,
          text: 'signin_with',
          shape: 'pill',
        });
      }
    };
    initGoogle();
  }, [user]);

  const handleGoogleResponse = useCallback((response) => {
    const payload = decodeJwt(response.credential);
    if (!payload) {
      setError('Failed to verify Google sign-in');
      return;
    }
    if (!payload.email || !payload.email.endsWith('@' + ALLOWED_DOMAIN)) {
      setError('Access denied. Use your company account.');
      return;
    }
    const userData = {
      email: payload.email,
      name: payload.name,
      picture: payload.picture,
      exp: payload.exp,
      credential: response.credential,
    };
    localStorage.setItem(GOOGLE_AUTH_KEY, JSON.stringify(userData));
    setUser(userData);
    setError('');
  }, []);

  const handleLogout = () => {
    localStorage.removeItem(GOOGLE_AUTH_KEY);
    setUser(null);
    if (window.google?.accounts?.id) {
      window.google.accounts.id.disableAutoSelect();
    }
  };

  if (user) return <ErrorBoundary><App onLogout={handleLogout} user={user} /></ErrorBoundary>;

  return (
    <div className="auth-gate">
      <div className="auth-box">
        <div className="auth-icon">🔒</div>
        <h2>Blueprint</h2>
        <p className="auth-domain">Sign in with your company account</p>

        <div className="auth-google-wrap">
          <div ref={googleBtnRef}></div>
        </div>

        {error && <div className="auth-msg">{error}</div>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<AuthGate />);
</script>
</body>
