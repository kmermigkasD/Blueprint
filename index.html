function DashboardView({ capacity, buffer, usedCapacity, bufferedUsed, totalDemand, bufferedDemand, trackCapacity, trackUsed, unallocated, tracks, currentData, roadmapIds, projectSprints, pillarColorMap, effectiveTrackCapacity, trackOverflow, quarterlyOvercap, splits, sizeMap, alerts, alertCounts, onDeleteAlert, onEditAlert, onTogglePromote, authUser, isEditor }) {
  const DISCIPLINES = ['backend', 'frontend', 'natives'];
  const DISC_COLORS = { backend: '#0984e3', frontend: '#00b894', natives: '#e84393' };
  const DISC_LABELS = { backend: 'Backend', frontend: 'Frontend', natives: 'Natives' };

  // Scope toggle: 'roadmap' = committed only, 'total' = roadmap + backlog
  const [dashScope, setDashScope] = React.useState('roadmap');

  // Active demand based on scope
  const activeDemand = dashScope === 'total' ? bufferedDemand : bufferedUsed;

  // Health gauge data per discipline
  const healthData = useMemo(() => DISCIPLINES.map(d => {
    const cap = capacity[d] || 0;
    const used = Math.round((activeDemand[d] || 0) * 10) / 10;
    const pct = cap > 0 ? Math.round((used / cap) * 100) : 0;
    const color = pct > 90 ? 'var(--red)' : pct > 75 ? '#fdcb6e' : 'var(--green)';
    const rawColor = pct > 90 ? '#e17055' : pct > 75 ? '#fdcb6e' : '#00b894';
    return { key: d, label: DISC_LABELS[d], used, cap, pct, color, rawColor };
  }), [capacity, activeDemand]);

  // Risk alerts
  const risks = useMemo(() => {
    const items = [];
    // 1. Discipline-level overcapacity (demand vs supply)
    DISCIPLINES.forEach(d => {
      const supply = capacity[d] || 0;
      const demand = Math.round((activeDemand[d] || 0) * 10) / 10;
      if (supply > 0 && demand > supply) {
        const overBy = Math.round((demand - supply) * 10) / 10;
        const pctOver = Math.round((overBy / supply) * 100);
        items.push({ type: 'discipline', severity: pctOver > 10 ? 'high' : 'med', label: DISC_LABELS[d],
          text: `${DISC_LABELS[d]}: ${dashScope === 'total' ? 'demand' : 'committed'} ${demand} SP vs ${supply} SP capacity`, overBy, pctOver });
      }
    });
    // 2. Track-level overflows
    if (effectiveTrackCapacity && trackUsed) {
      (tracks || []).forEach(t => {
        const tc = effectiveTrackCapacity[t.key] || {};
        const tu = trackUsed[t.key] || {};
        DISCIPLINES.forEach(d => {
          const cap = tc[d] || 0;
          const used = Math.round((tu[d] || 0) * 10) / 10;
          if (cap > 0 && used > cap) {
            const overBy = Math.round((used - cap) * 10) / 10;
            const pctOver = Math.round((overBy / cap) * 100);
            items.push({ type: 'track', severity: pctOver > 10 ? 'high' : 'med',
              label: `${t.label} · ${DISC_LABELS[d]}`,
              text: `${t.label} · ${DISC_LABELS[d]}: ${used}/${cap} SP`, overBy, pctOver });
          }
        });
      });
    }
    // 3. Quarterly risks
    if (quarterlyOvercap) {
      Object.entries(quarterlyOvercap).forEach(([tk, quarters]) => {
        const trackLabel = (tracks || []).find(t => t.key === tk)?.label || tk;
        Object.entries(quarters).sort((a, b) => {
          const [qa2, ya] = [parseInt(a[0][1]), parseInt(a[0].split(' ')[1])];
          const [qb2, yb] = [parseInt(b[0][1]), parseInt(b[0].split(' ')[1])];
          return ya !== yb ? ya - yb : qa2 - qb2;
        }).forEach(([qLabel, qData]) => {
          qData.over.forEach(o => {
            const pctOver = o.cap > 0 ? Math.round((o.overBy / o.cap) * 100) : 0;
            items.push({ type: 'quarterly', severity: pctOver > 10 ? 'high' : 'med',
              label: `${qLabel} · ${trackLabel}`,
              text: `${qLabel} · ${trackLabel} · ${o.discipline}: ${o.used}/${o.cap} SP`, overBy: o.overBy, pctOver });
          });
        });
      });
    }
    // Sort: high severity first, then by overBy descending
    items.sort((a, b) => {
      if (a.severity !== b.severity) return a.severity === 'high' ? -1 : 1;
      return b.overBy - a.overBy;
    });
    return items;
  }, [capacity, activeDemand, dashScope, effectiveTrackCapacity, trackUsed, tracks, quarterlyOvercap]);

  // Status counts
  const statusCounts = useMemo(() => {
    let inRoadmap = 0, inBacklog = 0, inProgress = 0, paused = 0, notStarted = 0;
    currentData.forEach(p => {
      if (roadmapIds.has(p.id)) {
        inRoadmap++;
        const s = CP.getProjectStatus(p);
        if (s === 'in_progress') inProgress++;
        else if (s === 'paused') paused++;
        else notStarted++;
      } else inBacklog++;
    });
    return { inRoadmap, inBacklog, inProgress, paused, notStarted, total: currentData.length };
  }, [currentData, roadmapIds]);

  // Total committed sprints
  const committedSprints = useMemo(() => {
    return currentData.filter(p => roadmapIds.has(p.id))
      .reduce((s, p) => s + (CP.computeProjectSprints(p, sizeMap || CP.DEFAULT_SIZE_MAP).total || 0), 0);
  }, [currentData, roadmapIds, sizeMap]);

  // By pillar
  const byPillar = useMemo(() => {
    const m = {};
    currentData.forEach(p => { const k = p.pillar || 'Unassigned'; m[k] = (m[k] || 0) + 1; });
    return Object.entries(m).sort((a, b) => b[1] - a[1]);
  }, [currentData]);

  // By impact
  const byImpact = useMemo(() => {
    const sizes = ['XS', 'S', 'M', 'L', 'XL', 'XXL', 'XXXL'];
    const m = {};
    sizes.forEach(s => m[s] = 0);
    currentData.forEach(p => { if (p.impact && m[p.impact] !== undefined) m[p.impact]++; });
    return sizes.map(s => [s, m[s]]).filter(([, c]) => c > 0);
  }, [currentData]);
  const maxImpact = byImpact.length > 0 ? Math.max(...byImpact.map(([, c]) => c)) : 1;

  // SVG gauge ring helper
  const CIRC = 2 * Math.PI * 50; // circumference for r=50
  const renderGauge = (d) => {
    const filled = (Math.min(d.pct, 100) / 100) * CIRC;
    return (
      <div className="exec-gauge exec-card" key={d.key}>
        <svg viewBox="0 0 120 120">
          <circle cx="60" cy="60" r="50" fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="8" />
          <circle cx="60" cy="60" r="50" fill="none" stroke={d.rawColor} strokeWidth="8"
            strokeDasharray={`${filled} ${CIRC - filled}`}
            strokeLinecap="round" transform="rotate(-90 60 60)"
            style={{transition:'stroke-dasharray 0.6s ease'}} />
          <text x="60" y="52" textAnchor="middle" fontSize="22" fontWeight="700" fill={d.rawColor}>{d.pct}%</text>
          <text x="60" y="70" textAnchor="middle" fontSize="10" fontWeight="600" fill="rgba(255,255,255,0.5)">{d.label}</text>
        </svg>
        <div className="exec-gauge-sub">{d.used} / {d.cap} SP</div>
      </div>
    );
  };

  // Donut chart segments
  const donutSegments = useMemo(() => {
    const total = statusCounts.total || 1;
    const segments = [
      { label: 'In Progress', count: statusCounts.inProgress, color: '#0984e3' },
      { label: 'Paused', count: statusCounts.paused, color: '#fdcb6e' },
      { label: 'Not Started', count: statusCounts.notStarted, color: 'rgba(255,255,255,0.15)' },
      { label: 'Backlog', count: statusCounts.inBacklog, color: '#e67e22' },
    ];
    let offset = 0;
    return segments.map(s => {
      const pct = (s.count / total) * CIRC;
      const seg = { ...s, dasharray: `${pct} ${CIRC - pct}`, dashoffset: -offset };
      offset += pct;
      return seg;
    });
  }, [statusCounts]);

  // Track health: per-discipline utilization + worst color
  const getHealthColor = (pct) => pct > 100 ? '#e17055' : pct > 80 ? '#fdcb6e' : '#00b894';

  return (
    <div className="exec-dashboard">
      {/* Scope Toggle */}
      <div style={{display:'flex',justifyContent:'flex-end',marginBottom:12}}>
        <div className="exec-scope-toggle">
          <button className={`exec-scope-btn${dashScope === 'roadmap' ? ' active' : ''}`} onClick={() => setDashScope('roadmap')}>Roadmap</button>
          <button className={`exec-scope-btn${dashScope === 'total' ? ' active' : ''}`} onClick={() => setDashScope('total')}>Total Demand</button>
        </div>
      </div>

      {/* Messages & Alerts */}
      {alerts && alerts.length > 0 && (() => {
        return (
          <div className="exec-card" style={{marginBottom:14}}>
            <div className="exec-card-header" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{display:'flex',alignItems:'center',gap:4}}>{IC.alert(14)} Messages & Alerts ({alerts.length})</span>
            </div>
            <div style={{maxHeight:260,overflowY:'auto'}}>
              {alerts.map(a => (
                <AlertRow key={a.id} alert={a}
                  canEdit={isEditor}
                  onEdit={(alertId, updates) => onEditAlert(alertId, updates)}
                  onDelete={(alertId) => onDeleteAlert(alertId)}
                  onTogglePromote={onTogglePromote ? (alertId, promoted) => onTogglePromote(alertId, promoted) : null}
                  projectLabel={a.projectId != null ? (() => {
                    const proj = currentData.find(p => String(p.id) === String(a.projectId));
                    return proj ? proj.subTask || proj.masterEpic || 'Project #' + a.projectId : null;
                  })() : null}
                />
              ))}
            </div>
          </div>
        );
      })()}

      {/* Row 1: Health Gauges */}
      <div className="exec-gauge-grid">
        {healthData.map(renderGauge)}
      </div>

      {/* Row 2: Risk Alerts + Pipeline Momentum */}
      <div className="exec-row">
        {/* Risk Alerts */}
        <div className="exec-card">
          <div className="exec-card-header">
            <span>{risks.length > 0 ? '⚠' : '✓'}</span>
            {risks.length > 0 ? `Attention Needed (${risks.length})` : 'Capacity Status'}
          </div>
          {risks.length === 0 ? (
            <div className="exec-all-clear">
              <span style={{fontSize:18}}>✓</span> All clear — no capacity issues detected
            </div>
          ) : (
            <div style={{maxHeight:260,overflowY:'auto'}}>
              {risks.slice(0, 12).map((r, i) => (
                <div key={i} className={`exec-risk-row severity-${r.severity}`}>
                  <div className="exec-risk-dot" style={{background: r.severity === 'high' ? '#e17055' : '#fdcb6e'}} />
                  <div>
                    <div className="exec-risk-text"><strong>{r.label}</strong></div>
                    <div className="exec-risk-sub">{r.text} (+{r.overBy} over)</div>
                  </div>
                </div>
              ))}
              {risks.length > 12 && (
                <div style={{fontSize:10,color:'var(--text2)',padding:'6px 10px'}}>+{risks.length - 12} more</div>
              )}
            </div>
          )}
        </div>

        {/* Pipeline Momentum */}
        <div className="exec-card">
          <div className="exec-card-header">Pipeline Momentum</div>
          <div className="exec-donut-wrap">
            <svg viewBox="0 0 120 120" style={{width:120,height:120,flexShrink:0}}>
              <circle cx="60" cy="60" r="50" fill="none" stroke="rgba(255,255,255,0.04)" strokeWidth="14" />
              {donutSegments.map((s, i) => s.count > 0 && (
                <circle key={i} cx="60" cy="60" r="50" fill="none" stroke={s.color} strokeWidth="14"
                  strokeDasharray={s.dasharray} strokeDashoffset={s.dashoffset}
                  transform="rotate(-90 60 60)" style={{transition:'all 0.6s ease'}} />
              ))}
              <text x="60" y="56" textAnchor="middle" fontSize="20" fontWeight="700" fill="var(--text)">{statusCounts.total}</text>
              <text x="60" y="70" textAnchor="middle" fontSize="8" fill="var(--text2)">PROJECTS</text>
            </svg>
            <div className="exec-donut-legend">
              {donutSegments.map((s, i) => (
                <div key={i} className="exec-legend-item">
                  <div className="exec-legend-dot" style={{background:s.color}} />
                  <span className="exec-legend-count">{s.count}</span>
                  <span style={{color:'var(--text2)'}}>{s.label}</span>
                </div>
              ))}
            </div>
          </div>
          <div className="exec-stats-grid">
            <div className="exec-stat-mini">
              <div className="exec-stat-val" style={{color:'#0984e3'}}>{statusCounts.inProgress}</div>
              <div className="exec-stat-label">In Flight</div>
            </div>
            <div className="exec-stat-mini">
              <div className="exec-stat-val" style={{color:'#fdcb6e'}}>{statusCounts.paused}</div>
              <div className="exec-stat-label">Paused</div>
            </div>
            <div className="exec-stat-mini">
              <div className="exec-stat-val" style={{color:'var(--text)'}}>
                {statusCounts.total > 0 ? Math.round((statusCounts.inRoadmap / statusCounts.total) * 100) : 0}%
              </div>
              <div className="exec-stat-label">Roadmap Util</div>
            </div>
            <div className="exec-stat-mini">
              <div className="exec-stat-val" style={{color:'var(--accent)'}}>{Math.round(committedSprints)}</div>
              <div className="exec-stat-label">Committed SP</div>
            </div>
          </div>
        </div>
      </div>

      {/* Row 3: Track Health + Allocation */}
      <div className="exec-row">
        {/* Track Health */}
        <div className="exec-card">
          <div className="exec-card-header">Track Health</div>
          {(tracks || []).map(t => {
            const etc = (effectiveTrackCapacity && effectiveTrackCapacity[t.key]) || trackCapacity[t.key] || {};
            const tu = trackUsed[t.key] || {};
            const discData = DISCIPLINES.map(d => {
              const cap = etc[d] || 0;
              const used = Math.round((tu[d] || 0) * 10) / 10;
              const pct = cap > 0 ? Math.round((used / cap) * 100) : 0;
              return { d, cap, used, pct, color: getHealthColor(pct) };
            });
            const worstPct = Math.max(...discData.map(dd => dd.pct), 0);
            const worstColor = getHealthColor(worstPct);
            return (
              <div key={t.key} className="exec-track-row">
                <div className="exec-track-name">
                  <div style={{width:7,height:7,borderRadius:'50%',background:worstColor,flexShrink:0}} />
                  {t.label}
                </div>
                <div className="exec-track-bars">
                  {discData.map(dd => (
                    <div key={dd.d} className="exec-mini-bar-wrap">
                      <div className="exec-mini-bar-label" style={{color:DISC_COLORS[dd.d]}}>{dd.d[0].toUpperCase()}</div>
                      <div className="exec-mini-bar">
                        <div className="exec-mini-bar-fill" style={{width:`${Math.min(dd.pct, 100)}%`,background:dd.color}} />
                      </div>
                      <div className="exec-mini-bar-val">{dd.used}/{dd.cap}</div>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
          {/* Unallocated */}
          <div className="exec-track-row" style={{opacity:0.6}}>
            <div className="exec-track-name" style={{color:'var(--text2)'}}>
              <div style={{width:7,height:7,borderRadius:'50%',background:'rgba(255,255,255,0.2)',flexShrink:0}} />
              Unallocated
            </div>
            <div className="exec-track-bars">
              {DISCIPLINES.map(d => (
                <div key={d} className="exec-mini-bar-wrap">
                  <div className="exec-mini-bar-label" style={{color:DISC_COLORS[d]}}>{d[0].toUpperCase()}</div>
                  <div className="exec-mini-bar" />
                  <div className="exec-mini-bar-val" style={{color:unallocated[d]<0?'#e17055':'var(--text2)'}}>{unallocated[d]} SP</div>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* Allocation Breakdown */}
        <div className="exec-card">
          <div className="exec-card-header">Allocation</div>
          <div className="exec-alloc-grid">
            {/* By Pillar */}
            <div>
              <div style={{fontSize:10,fontWeight:600,color:'var(--text2)',marginBottom:8,textTransform:'uppercase',letterSpacing:'0.5px'}}>By Pillar</div>
              {byPillar.slice(0, 8).map(([pillar, count]) => {
                const pct = currentData.length > 0 ? Math.round((count / currentData.length) * 100) : 0;
                const pColor = pillarColorMap[pillar] || '#6c5ce7';
                return (
                  <div key={pillar} className="exec-bar-row">
                    <div className="exec-bar-label">{pillar}</div>
                    <div className="exec-bar-track">
                      <div className="exec-bar-fill" style={{width:`${pct}%`,background:pColor}} />
                    </div>
                    <div className="exec-bar-count">{count}</div>
                  </div>
                );
              })}
            </div>
            {/* By Impact */}
            <div>
              <div style={{fontSize:10,fontWeight:600,color:'var(--text2)',marginBottom:8,textTransform:'uppercase',letterSpacing:'0.5px'}}>By Impact</div>
              {byImpact.map(([size, count]) => {
                const pct = maxImpact > 0 ? Math.round((count / maxImpact) * 100) : 0;
                const impactColors = { XS: '#636e72', S: '#00b894', M: '#0984e3', L: '#6c5ce7', XL: '#e84393', XXL: '#e17055', XXXL: '#d63031' };
                return (
                  <div key={size} className="exec-bar-row">
                    <div className="exec-bar-label" style={{minWidth:36}}>{size}</div>
                    <div className="exec-bar-track">
                      <div className="exec-bar-fill" style={{width:`${pct}%`,background:impactColors[size]||'var(--accent)'}} />
                    </div>
                    <div className="exec-bar-count">{count}</div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}


// ── Personal Notes Sidebar (left slide-in, non-blocking, admin-only) ──
function NotesSidebar({ isOpen, onClose, getAuthHeaders, verticalData, verticals, initialNote, onInitialNoteConsumed }) {
  const [notes, setNotes] = React.useState([]);
  const [loading, setLoading] = React.useState(false);
  const [activeNote, setActiveNote] = React.useState(null); // null = list, { id, title, content, vertical, projectId, projectName } = editor
  const [noteTitle, setNoteTitle] = React.useState('');
  const [noteVertical, setNoteVertical] = React.useState('');
  const [noteProjectId, setNoteProjectId] = React.useState(null);
  const [noteProjectName, setNoteProjectName] = React.useState('');
  const [projectSearch, setProjectSearch] = React.useState('');
  const [showProjectResults, setShowProjectResults] = React.useState(false);
  const quillRef = React.useRef(null);
  const editorRef = React.useRef(null);
  const pendingContentRef = React.useRef(null);
  const editorKeyRef = React.useRef(0);

  const fetchNotes = React.useCallback(async () => {
    setLoading(true);
    try {
      const res = await fetch(`${API_URL}/api/notes`, { headers: getAuthHeaders() });
      if (res.ok) {
        const data = await res.json();
        setNotes(data.notes || []);
      }
    } catch (e) { console.error('Failed to fetch notes:', e); }
    setLoading(false);
  }, [getAuthHeaders]);

  React.useEffect(() => {
    if (isOpen) fetchNotes();
  }, [isOpen]);

  // Handle initialNote prop (from project sidebar / AI chat)
  React.useEffect(() => {
    if (initialNote && isOpen) {
      // Destroy existing Quill so re-init works
      if (quillRef.current) {
        quillRef.current = null;
        if (editorRef.current) editorRef.current.innerHTML = '';
      }
      pendingContentRef.current = initialNote.content || '';
      editorKeyRef.current++;
      setActiveNote({ id: null, ...initialNote });
      setNoteTitle(initialNote.title || '');
      setNoteVertical(initialNote.vertical || '');
      setNoteProjectId(initialNote.projectId || null);
      setNoteProjectName(initialNote.projectName || '');
      setProjectSearch('');
      if (onInitialNoteConsumed) onInitialNoteConsumed();
    }
  }, [initialNote, isOpen]);

  // Init Quill when entering editor view
  React.useEffect(() => {
    if (!activeNote) {
      if (quillRef.current) quillRef.current = null;
      return;
    }
    // Destroy previous Quill instance to allow clean re-init
    if (quillRef.current) {
      quillRef.current = null;
      if (editorRef.current) editorRef.current.innerHTML = '';
    }
    // Store content before rAF (activeNote may be stale in the closure)
    const contentToSet = pendingContentRef.current != null ? pendingContentRef.current : (activeNote.content || '');
    pendingContentRef.current = null;
    // Use setTimeout to ensure DOM is ready after panel CSS transition
    const timer = setTimeout(() => {
      if (!editorRef.current) return;
      const q = new Quill(editorRef.current, {
        theme: 'snow',
        placeholder: 'Write your note...',
        modules: {
          toolbar: [
            ['bold', 'italic', 'underline'],
            [{ header: [1, 2, 3, false] }],
            [{ list: 'ordered' }, { list: 'bullet' }],
            ['clean'],
          ],
        },
      });
      if (contentToSet) q.root.innerHTML = contentToSet;
      q.focus();
      quillRef.current = q;
    }, 50);
    return () => clearTimeout(timer);
  }, [editorKeyRef.current]);

  // Project search results
  const projectResults = React.useMemo(() => {
    if (!projectSearch || projectSearch.length < 2 || !verticalData) return [];
    const q = projectSearch.toLowerCase();
    const results = [];
    for (const [vKey, vData] of Object.entries(verticalData)) {
      const projects = Array.isArray(vData) ? vData : (vData && vData.projects ? vData.projects : []);
      if (!projects.length) continue;
      for (const p of projects) {
        if (results.length >= 15) break;
        const match = (p.subTask && p.subTask.toLowerCase().includes(q)) ||
                      (p.nvrd && p.nvrd.toLowerCase().includes(q)) ||
                      (p.masterEpic && p.masterEpic.toLowerCase().includes(q));
        if (match) results.push({ ...p, _vertical: vKey });
      }
    }
    return results;
  }, [projectSearch, verticalData]);

  const handleSave = React.useCallback(async () => {
    if (!quillRef.current) return;
    const html = quillRef.current.root.innerHTML;
    const isEmpty = !html || html === '<p><br></p>' || html.replace(/<[^>]*>/g, '').trim() === '';
    const content = isEmpty ? '' : html;
    const title = noteTitle.trim();
    if (!title && !content) return;

    const body = { title, content };
    if (noteVertical) body.vertical = noteVertical;
    if (noteProjectId != null) { body.projectId = noteProjectId; body.projectName = noteProjectName; }
    if (!noteVertical) { body.vertical = null; }
    if (noteProjectId == null) { body.projectId = null; body.projectName = null; }

    try {
      if (activeNote.id) {
        await fetch(`${API_URL}/api/notes/${activeNote.id}`, {
          method: 'PUT', headers: getAuthHeaders(), body: JSON.stringify(body),
        });
      } else {
        await fetch(`${API_URL}/api/notes`, {
          method: 'POST', headers: getAuthHeaders(), body: JSON.stringify(body),
        });
      }
    } catch (e) { console.error('Failed to save note:', e); }
    setActiveNote(null);
    setNoteTitle('');
    setNoteVertical('');
    setNoteProjectId(null);
    setNoteProjectName('');
    setProjectSearch('');
    fetchNotes();
  }, [activeNote, noteTitle, noteVertical, noteProjectId, noteProjectName, getAuthHeaders, fetchNotes]);

  const handleDelete = React.useCallback(async () => {
    if (!activeNote || !activeNote.id) return;
    try {
      await fetch(`${API_URL}/api/notes/${activeNote.id}`, {
        method: 'DELETE', headers: getAuthHeaders(),
      });
    } catch (e) { console.error('Failed to delete note:', e); }
    setActiveNote(null);
    setNoteTitle('');
    setNoteVertical('');
    setNoteProjectId(null);
    setNoteProjectName('');
    fetchNotes();
  }, [activeNote, getAuthHeaders, fetchNotes]);

  const handleDeleteFromList = React.useCallback(async (e, noteId) => {
    e.stopPropagation();
    if (!confirm('Delete this note?')) return;
    try {
      await fetch(`${API_URL}/api/notes/${noteId}`, {
        method: 'DELETE', headers: getAuthHeaders(),
      });
    } catch (e) { console.error('Failed to delete note:', e); }
    fetchNotes();
  }, [getAuthHeaders, fetchNotes]);

  const openNote = React.useCallback((note) => {
    if (quillRef.current) { quillRef.current = null; if (editorRef.current) editorRef.current.innerHTML = ''; }
    pendingContentRef.current = note.content || '';
    editorKeyRef.current++;
    setActiveNote({ id: note.id, title: note.title, content: note.content, vertical: note.vertical, projectId: note.projectId, projectName: note.projectName });
    setNoteTitle(note.title || '');
    setNoteVertical(note.vertical || '');
    setNoteProjectId(note.projectId || null);
    setNoteProjectName(note.projectName || '');
    setProjectSearch('');
  }, []);

  const openNewNote = React.useCallback(() => {
    if (quillRef.current) { quillRef.current = null; if (editorRef.current) editorRef.current.innerHTML = ''; }
    pendingContentRef.current = '';
    editorKeyRef.current++;
    setActiveNote({ id: null, title: '', content: '' });
    setNoteTitle('');
    setNoteVertical('');
    setNoteProjectId(null);
    setNoteProjectName('');
    setProjectSearch('');
  }, []);

  const goBack = React.useCallback(() => {
    setActiveNote(null);
    setNoteTitle('');
    setNoteVertical('');
    setNoteProjectId(null);
    setNoteProjectName('');
    setProjectSearch('');
  }, []);

  const selectProject = React.useCallback((p) => {
    setNoteProjectId(p.id);
    setNoteProjectName(p.subTask || p.masterEpic || '');
    setNoteVertical(p._vertical);
    setProjectSearch('');
    setShowProjectResults(false);
  }, []);

  const clearProject = React.useCallback(() => {
    setNoteProjectId(null);
    setNoteProjectName('');
    setProjectSearch('');
  }, []);

  const formatDate = React.useCallback((iso) => {
    if (!iso) return '';
    const d = new Date(iso);
    const now = new Date();
    const diff = now - d;
    if (diff < 60000) return 'Just now';
    if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
    if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
    if (diff < 604800000) return Math.floor(diff / 86400000) + 'd ago';
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
  }, []);

  const stripHtml = React.useCallback((html) => {
    if (!html) return '';
    return html.replace(/<[^>]*>/g, '').trim();
  }, []);

  // Escape to close
  React.useEffect(() => {
    if (!isOpen) return;
    const handler = (e) => {
      if (e.key === 'Escape') {
        if (activeNote) goBack();
        else onClose();
      }
    };
    document.addEventListener('keydown', handler);
    return () => document.removeEventListener('keydown', handler);
  }, [isOpen, activeNote, goBack, onClose]);

  return React.createElement('div', {
    className: `notes-sidebar ${isOpen ? 'open' : ''}`,
  },
    // List view
    React.createElement('div', { className: 'notes-sidebar-header' },
      React.createElement('h3', null, 'My Notes'),
      React.createElement('button', { className: 'notes-sidebar-close', onClick: onClose }, '\u2715'),
    ),
    React.createElement('button', { className: 'notes-new-btn', onClick: openNewNote },
      React.createElement('span', null, '+'),
      'New Note',
    ),
    React.createElement('div', { className: 'notes-list' },
      loading
        ? React.createElement('div', { className: 'notes-list-empty' }, 'Loading...')
        : notes.length === 0
          ? React.createElement('div', { className: 'notes-list-empty' }, 'No notes yet. Create your first note!')
          : notes.map(n => React.createElement('div', {
              key: n.id, className: 'notes-card', onClick: () => openNote(n),
            },
              React.createElement('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' } },
                React.createElement('div', { className: 'notes-card-title', style: { flex: 1, minWidth: 0 } }, n.title || 'Untitled'),
                React.createElement('button', {
                  className: 'notes-card-delete',
                  title: 'Delete note',
                  onClick: (e) => handleDeleteFromList(e, n.id),
                }, IC.close(12)),
              ),
              React.createElement('div', { className: 'notes-card-preview' }, stripHtml(n.content) || 'Empty note'),
              React.createElement('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 4 } },
                React.createElement('div', { className: 'notes-card-tags' },
                  n.vertical && React.createElement('span', { className: 'notes-card-tag vertical' }, n.vertical),
                  n.projectName && React.createElement('span', { className: 'notes-card-tag project' }, n.projectName.slice(0, 30)),
                ),
                React.createElement('span', { className: 'notes-card-date', style: { marginTop: 0 } }, formatDate(n.updatedAt)),
              ),
            )),
    ),
    // Editor panel (nested, slides over list)
    React.createElement('div', {
      key: editorKeyRef.current,
      className: `notes-editor-panel ${activeNote ? 'open' : ''}`,
    },
      React.createElement('div', { className: 'notes-editor-header' },
        React.createElement('button', { className: 'notes-editor-back', onClick: goBack }, '\u2190'),
        React.createElement('span', { style: { fontSize: 14, fontWeight: 600, color: 'var(--text)' } },
          activeNote && activeNote.id ? 'Edit Note' : 'New Note'),
      ),
      React.createElement('input', {
        className: 'notes-editor-title-input',
        type: 'text', placeholder: 'Note title...',
        value: noteTitle,
        onChange: (e) => setNoteTitle(e.target.value),
      }),
      // Vertical selector
      React.createElement('div', { className: 'notes-tag-row' },
        React.createElement('select', {
          className: 'notes-vertical-select',
          value: noteVertical,
          onChange: (e) => setNoteVertical(e.target.value),
        },
          React.createElement('option', { value: '' }, 'No vertical'),
          (verticals || []).map(v => React.createElement('option', { key: v.key, value: v.key }, v.label)),
        ),
      ),
      // Project tag
      noteProjectId != null
        ? React.createElement('div', { className: 'notes-project-chip' },
            React.createElement('span', null, noteProjectName || 'Project #' + noteProjectId),
            React.createElement('button', { onClick: clearProject }, '\u2715'),
          )
        : React.createElement('div', { className: 'notes-project-search-wrap' },
            React.createElement('input', {
              className: 'notes-project-search',
              type: 'text', placeholder: 'Search project to tag...',
              value: projectSearch,
              onChange: (e) => { setProjectSearch(e.target.value); setShowProjectResults(true); },
              onFocus: () => setShowProjectResults(true),
              onBlur: () => setTimeout(() => setShowProjectResults(false), 200),
            }),
            showProjectResults && projectResults.length > 0 && React.createElement('div', { className: 'notes-project-results' },
              projectResults.map(p => React.createElement('div', {
                key: p._vertical + ':' + p.id, className: 'notes-project-result',
                onMouseDown: (e) => { e.preventDefault(); selectProject(p); },
              },
                React.createElement('span', { className: 'notes-project-result-nvrd' }, p.nvrd || '-'),
                React.createElement('span', { className: 'notes-project-result-name' }, p.subTask || p.masterEpic || 'Unnamed'),
                React.createElement('span', { className: 'notes-project-result-vertical' }, p._vertical),
              )),
            ),
          ),
      React.createElement('div', { className: 'notes-editor-body' },
        React.createElement('div', { className: 'notes-editor-wrap' },
          React.createElement('div', { ref: editorRef }),
        ),
      ),
      React.createElement('div', { className: 'notes-editor-footer' },
        activeNote && activeNote.id && React.createElement('button', {
          className: 'btn btn-delete', onClick: handleDelete,
        }, 'Delete'),
        React.createElement('div', { style: { flex: 1 } }),
        React.createElement('button', { className: 'btn btn-cancel', onClick: goBack }, 'Cancel'),
        React.createElement('button', { className: 'btn btn-save', onClick: handleSave }, 'Save'),
      ),
    ),
  );
}


// ══════════════════════════════════════════════════════════
// Executive View — Cross-Vertical Portfolio Dashboard
// ══════════════════════════════════════════════════════════
function ExecutiveView({ verticalStates, verticalData, verticals: allVerticals, sizeMap, onNavigateToVertical, allAlertCounts }) {
  const BUILTIN_KEYS = new Set(['growth', 'sportsbook', 'casino', 'account', 'payments', 'social']);
  const verticals = allVerticals.filter(v => BUILTIN_KEYS.has(v.key));
  const DISCIPLINES = ['backend', 'frontend', 'natives'];
  const DISC_COLORS = { backend: '#0984e3', frontend: '#00b894', natives: '#e84393' };
  const DISC_LABELS = { backend: 'Backend', frontend: 'Frontend', natives: 'Natives' };
  const getHealthColor = (pct) => pct > 90 ? '#e17055' : pct > 75 ? '#fdcb6e' : '#00b894';

  // Combined pillar color map across all verticals
  const pillarColorMap = useMemo(() => {
    const allProjects = [];
    verticals.forEach(v => { (verticalData[v.key] || []).forEach(p => allProjects.push(p)); });
    return CP.buildPillarColorMap(allProjects);
  }, [verticals, verticalData]);

  const [selectedVKey, setSelectedVKey] = useState(null);
  const [selectedDisc, setSelectedDisc] = useState(null); // discipline focus from risk click
  const [selectedQuarterlyRisk, setSelectedQuarterlyRisk] = useState(null); // quarterly risk object for sidebar
  const [riskFilter, setRiskFilter] = useState('all'); // 'all' or vertical key
  const [expandedQGroups, setExpandedQGroups] = useState(new Set());
  const [execAlertFilter, setExecAlertFilter] = useState('all'); // 'all' or vertical key
  const [execAlertLevel, setExecAlertLevel] = useState('all'); // 'all' | 'critical' | 'warning' | 'info'
  const [execAlerts, setExecAlerts] = useState({}); // { growth: [...], ... }
  const [execAlertsLoaded, setExecAlertsLoaded] = useState(false);

  // Per-vertical breakdown
  const verticalBreakdown = useMemo(() => {
    try {
    return verticals.map(v => {
      const state = verticalStates[v.key] || {};
      const projects = verticalData[v.key] || [];
      const capacity = state.capacity || { backend: 0, frontend: 0, natives: 0 };
      const tracks = state.tracks || {};
      const splits = state.splits || {};
      const buffer = state.buffer || { backend: 0, frontend: 0, natives: 0 };

      // Roadmap IDs
      const roadmapIds = new Set();
      for (const arr of Object.values(tracks)) {
        if (Array.isArray(arr)) arr.forEach(id => roadmapIds.add(id));
      }

      // Used capacity (roadmap only)
      const usedCapacity = CP.computeUsedCapacity(projects, roadmapIds, sizeMap);
      const bufferedUsed = CP.computeBuffered(usedCapacity, buffer);

      // Total capacity
      const totalCap = DISCIPLINES.reduce((s, d) => s + (capacity[d] || 0), 0);
      const totalUsed = DISCIPLINES.reduce((s, d) => s + (bufferedUsed[d] || 0), 0);
      const utilPct = totalCap > 0 ? Math.round((totalUsed / totalCap) * 100) : 0;

      // Worst discipline
      const worstPct = Math.max(...DISCIPLINES.map(d => {
        const cap = capacity[d] || 0;
        return cap > 0 ? Math.round((bufferedUsed[d] / cap) * 100) : 0;
      }), 0);

      // Status counts
      let inProgress = 0, paused = 0, notStarted = 0;
      projects.forEach(p => {
        const st = CP.getProjectStatus ? CP.getProjectStatus(p) : (p.status || (p.inProgress ? 'in_progress' : 'not_started'));
        if (st === 'in_progress') inProgress++;
        else if (st === 'paused') paused++;
        else notStarted++;
      });

      // Risk count (disciplines over capacity)
      let riskCount = 0;
      DISCIPLINES.forEach(d => {
        if ((capacity[d] || 0) > 0 && bufferedUsed[d] > capacity[d]) riskCount++;
      });

      return {
        key: v.key, label: v.label, icon: v.icon, color: v.color,
        capacity, usedCapacity, bufferedUsed, totalCap, totalUsed, utilPct, worstPct,
        projectCount: projects.length, roadmapCount: roadmapIds.size,
        inProgress, paused, notStarted, riskCount,
        roadmapIds, projects, tracks, splits, buffer
      };
    });
    } catch (e) { console.error('[ExecutiveView] verticalBreakdown error:', e); return []; }
  }, [verticals, verticalStates, verticalData, sizeMap]);

  const selectedV = selectedVKey ? verticalBreakdown.find(v => v.key === selectedVKey) : null;

  // Aggregate capacity across all verticals
  const aggregateData = useMemo(() => {
    const totalCap = { backend: 0, frontend: 0, natives: 0 };
    const totalUsed = { backend: 0, frontend: 0, natives: 0 };
    verticalBreakdown.forEach(v => {
      DISCIPLINES.forEach(d => {
        totalCap[d] += v.capacity[d] || 0;
        totalUsed[d] += v.bufferedUsed[d] || 0;
      });
    });
    return { totalCap, totalUsed };
  }, [verticalBreakdown]);

  // All risks across all verticals (overall + per-track quarterly)
  const allRisks = useMemo(() => {
    const items = [];
    verticalBreakdown.forEach(v => {
      // 1. Overall discipline overcapacity
      DISCIPLINES.forEach(d => {
        const cap = v.capacity[d] || 0;
        const used = Math.round((v.bufferedUsed[d] || 0) * 10) / 10;
        if (cap > 0 && used > cap) {
          const overBy = Math.round((used - cap) * 10) / 10;
          const pctOver = Math.round((overBy / cap) * 100);
          items.push({
            type: 'overall', severity: pctOver > 10 ? 'high' : 'med',
            label: `${v.icon} ${v.label} · ${DISC_LABELS[d]}`,
            text: `${used}/${cap} SP (+${overBy} over)`,
            pctOver, overBy, vKey: v.key, disc: d
          });
        }
      });
      // 2. Per-track per-quarter overcapacity (same logic as planner)
      const state = verticalStates[v.key] || {};
      const qTrackCap = state.quarterlyTrackCapacity || {};
      const trackCap = state.trackCapacity || {};
      const tracks = state.tracks || {};
      const splits = state.splits || {};
      const projects = verticalData[v.key] || [];
      const trackConfig = state.trackConfig || CP.DEFAULT_TRACK_CONFIG;
      const tc = state.timelineConfig || {};
      const sprintWeeks = tc.sprintDurationWeeks || 2;
      const startDate = new Date(tc.sprintStartDate || Date.now());
      const timelineOverrides = state.timelineOverrides || {};
      const projectById = {};
      projects.forEach(p => { projectById[p.id] = p; });
      // Build ghost blocks for splits
      const ghostsByTrack = {};
      if (splits) {
        Object.entries(splits).forEach(([pid, trackSplits]) => {
          const p = projectById[pid];
          if (!p) return;
          Object.entries(trackSplits).forEach(([tk, sizing]) => {
            if (!sizing || typeof sizing !== 'object') return;
            const total = DISCIPLINES.reduce((s, d) => s + CP.sizeToSprints(sizing[d], sizeMap), 0);
            if (total > 0) {
              if (!ghostsByTrack[tk]) ghostsByTrack[tk] = [];
              ghostsByTrack[tk].push({ project: p, sizing: { backend: CP.sizeToSprints(sizing.backend, sizeMap), frontend: CP.sizeToSprints(sizing.frontend, sizeMap), natives: CP.sizeToSprints(sizing.natives, sizeMap) } });
            }
          });
        });
      }
      // Build timeline bars per track, compute quarterly demand
      trackConfig.forEach(track => {
        const tk = track.key;
        const qDemand = {}; // { "Q1 2026": { backend: 0, ... } }
        const qProjects = {}; // { "Q1 2026": [{ name, id, sprints }] }
        let cumSprints = 0;
        // Main projects
        (tracks[tk] || []).forEach(pid => {
          const p = projectById[pid];
          if (!p) return;
          const eff = CP.computeEffectiveSprints(p, splits, sizeMap);
          const ovKey = `${tk}:${pid}`;
          const ov = timelineOverrides[ovKey];
          const startSp = ov && ov.startSprints != null ? ov.startSprints : cumSprints;
          const durSp = ov && ov.durationSprints != null ? ov.durationSprints : eff.total;
          const midWeeks = ((startSp + startSp + durSp) / 2) * sprintWeeks;
          const midDate = new Date(startDate); midDate.setDate(midDate.getDate() + midWeeks * 7);
          const q = Math.floor(midDate.getMonth() / 3) + 1;
          const qLabel = `Q${q} ${midDate.getFullYear()}`;
          if (!qDemand[qLabel]) qDemand[qLabel] = { backend: 0, frontend: 0, natives: 0 };
          if (!qProjects[qLabel]) qProjects[qLabel] = [];
          DISCIPLINES.forEach(d => { qDemand[qLabel][d] += (eff[d] || 0); });
          qProjects[qLabel].push({ name: p.subTask || p.masterEpic || `#${p.id}`, id: p.id, sprints: eff });
          if (!ov) cumSprints = cumSprints + eff.total;
          else cumSprints = Math.max(cumSprints, startSp + durSp);
        });
        // Ghost blocks
        (ghostsByTrack[tk] || []).forEach(g => {
          const totalSp = DISCIPLINES.reduce((s, d) => s + (g.sizing[d] || 0), 0);
          const ovKey = `${tk}:${g.project.id}`;
          const ov = timelineOverrides[ovKey];
          const startSp = ov && ov.startSprints != null ? ov.startSprints : cumSprints;
          const durSp = ov && ov.durationSprints != null ? ov.durationSprints : totalSp;
          const midWeeks = ((startSp + startSp + durSp) / 2) * sprintWeeks;
          const midDate = new Date(startDate); midDate.setDate(midDate.getDate() + midWeeks * 7);
          const q = Math.floor(midDate.getMonth() / 3) + 1;
          const qLabel = `Q${q} ${midDate.getFullYear()}`;
          if (!qDemand[qLabel]) qDemand[qLabel] = { backend: 0, frontend: 0, natives: 0 };
          if (!qProjects[qLabel]) qProjects[qLabel] = [];
          DISCIPLINES.forEach(d => { qDemand[qLabel][d] += (g.sizing[d] || 0); });
          qProjects[qLabel].push({ name: '↗ ' + (g.project.subTask || g.project.masterEpic || `#${g.project.id}`), id: g.project.id, sprints: g.sizing, isGhost: true });
          if (!ov) cumSprints += totalSp; else cumSprints = Math.max(cumSprints, startSp + durSp);
        });
        // Compare demand vs quarterly track capacity
        Object.entries(qDemand).forEach(([qLabel, demand]) => {
          const qtcQ = qTrackCap[qLabel];
          const qTc = (qtcQ && qtcQ[tk]) || trackCap[tk] || { backend: 0, frontend: 0, natives: 0 };
          const overDiscs = [];
          DISCIPLINES.forEach(d => {
            const used = Math.round(demand[d] * 10) / 10;
            const cap = qTc[d] || 0;
            if (cap > 0 && used > cap) {
              overDiscs.push({ discipline: DISC_LABELS[d], key: d, used, cap, overBy: Math.round((used - cap) * 10) / 10 });
            }
          });
          if (overDiscs.length > 0) {
            const worstPctOver = Math.max(...overDiscs.map(o => o.cap > 0 ? Math.round((o.overBy / o.cap) * 100) : 0));
            const relevantProjects = (qProjects[qLabel] || [])
              .filter(p => overDiscs.some(o => p.sprints[o.key] > 0))
              .sort((a, b) => {
                const keys = overDiscs.map(o => o.key);
                return keys.reduce((s, d) => s + (b.sprints[d] || 0), 0) - keys.reduce((s, d) => s + (a.sprints[d] || 0), 0);
              });
            items.push({
              type: 'quarterly', severity: worstPctOver > 10 ? 'high' : 'med',
              label: `${v.icon} ${v.label} · ${track.label}`,
              text: overDiscs.map(o => `${o.discipline}: ${o.used}/${o.cap} SP`).join(', '),
              pctOver: worstPctOver, overBy: Math.max(...overDiscs.map(o => o.overBy)),
              vKey: v.key, disc: overDiscs[0].key, quarter: qLabel, trackKey: tk, trackLabel: track.label,
              overDiscs, projects: relevantProjects
            });
          }
        });
      });
    });
    items.sort((a, b) => b.pctOver - a.pctOver);
    return items;
  }, [verticalBreakdown, verticalStates, verticalData, sizeMap]);

  // Quarterly delivery timeline
  const quarterlyDelivery = useMemo(() => {
    const now = new Date();
    const currentQ = Math.floor(now.getMonth() / 3);
    const currentYear = now.getFullYear();
    const quarters = [];
    for (let i = 0; i < 4; i++) {
      const q = (currentQ + i) % 4;
      const y = currentYear + Math.floor((currentQ + i) / 4);
      quarters.push({ label: `Q${q + 1} ${y}`, q, y, start: new Date(y, q * 3, 1), end: new Date(y, (q + 1) * 3, 0) });
    }

    const result = quarters.map(q => ({ ...q, verticals: [] }));

    verticalBreakdown.forEach(vb => {
      const state = verticalStates[vb.key] || {};
      const tc = state.timelineConfig || { sprintStartDate: `${currentYear}-01-01`, sprintDurationWeeks: 2 };
      const sprintStart = new Date(tc.sprintStartDate || `${currentYear}-01-01`);
      const sprintMs = (tc.sprintDurationWeeks || 2) * 7 * 86400000;
      const overrides = state.timelineOverrides || {};
      const trackBlockOrders = state.trackBlockOrder || {};
      const tracks = state.tracks || {};

      const verticalProjects = [];
      const projectById = {};
      (verticalData[vb.key] || []).forEach(p => { projectById[p.id] = p; });

      // Iterate tracks to get all roadmap projects with position info
      for (const [trackKey, projectIds] of Object.entries(tracks)) {
        if (!Array.isArray(projectIds)) continue;
        const order = trackBlockOrders[trackKey] || projectIds.map(String);
        let sprintOffset = 0;
        for (const blockId of order) {
          const isGhost = String(blockId).startsWith('ghost:');
          const pid = isGhost ? parseInt(String(blockId).replace('ghost:', '')) : parseInt(blockId);
          if (isNaN(pid)) continue;
          const p = projectById[pid];
          if (!p) continue;

          const overrideKey = `${trackKey}:${pid}`;
          const ovr = overrides[overrideKey];
          let startSp = ovr ? (ovr.startSprints || 0) : sprintOffset;
          let durSp = ovr ? (ovr.durationSprints || 1) : (CP.computeProjectSprints(p, sizeMap).total || 1);

          const endMs = sprintStart.getTime() + (startSp + durSp) * sprintMs;
          const endDate = new Date(endMs);

          if (!isGhost) {
            verticalProjects.push({ project: p, endDate, trackKey });
          }
          if (!ovr) sprintOffset += durSp;
        }
      }

      // Bucket into quarters
      result.forEach(q => {
        const matching = verticalProjects.filter(vp => vp.endDate >= q.start && vp.endDate <= q.end);
        if (matching.length > 0) {
          q.verticals.push({
            key: vb.key, icon: vb.icon, label: vb.label, color: vb.color,
            projects: matching.map(m => ({
              name: m.project.subTask || m.project.masterEpic || `Project ${m.project.id}`,
              pillar: m.project.pillar,
            }))
          });
        }
      });
    });

    return result;
  }, [verticalBreakdown, verticalStates, verticalData, sizeMap]);

  // Portfolio distribution by status across all verticals
  const portfolioStats = useMemo(() => {
    let total = 0, inRoadmap = 0, inProgress = 0, paused = 0;
    verticalBreakdown.forEach(v => {
      total += v.projectCount;
      inRoadmap += v.roadmapCount;
      inProgress += v.inProgress;
      paused += v.paused;
    });
    return { total, inRoadmap, inProgress, paused, notStarted: total - inProgress - paused };
  }, [verticalBreakdown]);

  // Total promoted alert count across verticals (only promoted ones show in Executive View)
  const totalAlertCount = useMemo(() => {
    let t = 0;
    verticals.forEach(v => { t += (allAlertCounts[v.key]?.promoted || 0); });
    return t;
  }, [verticals, allAlertCounts]);
  // Total alert count across verticals (used to trigger lazy-load)
  const totalAlertCountAll = useMemo(() => {
    let t = 0;
    verticals.forEach(v => { t += (allAlertCounts[v.key]?.total || 0); });
    return t;
  }, [verticals, allAlertCounts]);

  // Lazy-load alerts for all verticals when there are alerts
  useEffect(() => {
    if (totalAlertCountAll === 0 || execAlertsLoaded) return;
    const API_URL = 'https://capacity-planner-production-1cf7.up.railway.app';
    (async () => {
      const loaded = {};
      await Promise.all(verticals.filter(v => (allAlertCounts[v.key]?.total || 0) > 0).map(async v => {
        try {
          const res = await fetch(`${API_URL}/api/verticals/${v.key}/alerts`);
          if (res.ok) loaded[v.key] = (await res.json()).alerts || [];
        } catch (e) {}
      }));
      setExecAlerts(loaded);
      setExecAlertsLoaded(true);
    })();
  }, [totalAlertCountAll, execAlertsLoaded, verticals, allAlertCounts]);

  return (
    <div className="xv-dashboard">
      {/* Messages & Alerts across verticals */}
      {(() => {
        const allAlertsList = [];
        const projectLookup = {};
        verticals.forEach(v => {
          (execAlerts[v.key] || []).forEach(a => {
            if (!a.promoted) return; // Only show promoted alerts in Executive View
            allAlertsList.push({ ...a, vKey: v.key, vIcon: v.icon, vLabel: v.label });
          });
          (verticalData[v.key] || []).forEach(p => {
            projectLookup[String(p.id)] = p.subTask || p.masterEpic || `Project #${p.id}`;
          });
        });
        let filtered = allAlertsList;
        if (execAlertFilter !== 'all') filtered = filtered.filter(a => a.vKey === execAlertFilter);
        if (execAlertLevel !== 'all') filtered = filtered.filter(a => a.level === execAlertLevel);
        const levelOrder = { critical: 0, warning: 1, info: 2 };
        filtered.sort((a, b) => (levelOrder[a.level] - levelOrder[b.level]) || (new Date(b.createdAt) - new Date(a.createdAt)));
        return (
          <div className="exec-card" style={{marginBottom:14}}>
            <div className="exec-card-header" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{display:'flex',alignItems:'center',gap:4}}>{IC.alert(14)} Messages & Alerts</span>
              {totalAlertCount > 0 && <span style={{fontSize:10,fontWeight:600,color:'var(--text2)',background:'rgba(225,112,85,0.15)',padding:'2px 8px',borderRadius:9999}}>{totalAlertCount}</span>}
            </div>
            <div style={{padding:'0 12px 6px'}}>
              <div style={{fontSize:9,fontWeight:600,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:4}}>Vertical</div>
              <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                <button className={`xv-filter-pill ${execAlertFilter === 'all' ? 'active' : ''}`} onClick={() => setExecAlertFilter('all')}>All</button>
                {verticals.filter(v => (allAlertCounts[v.key]?.total || 0) > 0).map(v => (
                  <button key={v.key} className={`xv-filter-pill ${execAlertFilter === v.key ? 'active' : ''}`}
                    onClick={() => setExecAlertFilter(execAlertFilter === v.key ? 'all' : v.key)}>
                    {v.icon} {v.label} ({allAlertCounts[v.key]?.total})
                  </button>
                ))}
              </div>
            </div>
            <div style={{padding:'0 12px 8px',display:'flex',gap:14,flexWrap:'wrap',alignItems:'center'}}>
              <div style={{display:'flex',gap:6,alignItems:'center'}}>
                <span style={{fontSize:8,fontWeight:600,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'0.5px',opacity:0.4}}>Level</span>
                <button className={`xv-filter-link ${execAlertLevel === 'all' ? 'active' : ''}`}
                  style={execAlertLevel === 'all' ? {borderBottomColor:'var(--text)',color:'var(--text)'} : {}}
                  onClick={() => setExecAlertLevel('all')}>All</button>
                {['critical','warning','info'].map(l => {
                  const count = allAlertsList.filter(a => a.level === l && (execAlertFilter === 'all' || a.vKey === execAlertFilter)).length;
                  return count > 0 ? (
                    <button key={l} className={`xv-filter-link ${execAlertLevel === l ? 'active' : ''}`}
                      style={execAlertLevel === l ? {borderBottomColor: ALERT_COLORS[l], color: ALERT_COLORS[l]} : {color: ALERT_COLORS[l]}}
                      onClick={() => setExecAlertLevel(execAlertLevel === l ? 'all' : l)}>
                      {l.charAt(0).toUpperCase() + l.slice(1)} ({count})
                    </button>
                  ) : null;
                })}
              </div>
            </div>
            {filtered.length === 0 ? (
              <div className="exec-all-clear" style={{padding:'16px 12px'}}>
                {totalAlertCount === 0 ? 'No promoted alerts — use 📤 on alerts to show them here' : 'No alerts match the selected filters'}
              </div>
            ) : (
              <div style={{maxHeight:300,overflowY:'auto'}}>
                {filtered.map((a, i) => (
                  <div key={a.id || i} className={`exec-risk-row severity-${ALERT_LEVEL_MAP[a.level]}`}>
                    <div className="exec-risk-dot" style={{background: ALERT_COLORS[a.level]}} />
                    <div style={{flex:1,minWidth:0}}>
                      <div className="exec-risk-text">{a.text}</div>
                      <div className="exec-risk-sub">
                        {a.vIcon} {a.vLabel}
                        {a.projectId != null && ` · ${projectLookup[String(a.projectId)] || 'Project #' + a.projectId}`}
                        {' · '}{a.authorName} · {formatAlertTime(a.createdAt)}
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })()}

      {/* Row 1: Vertical Health Cards */}
      <div className="xv-vertical-grid">
        {verticalBreakdown.map(v => {
          const healthColor = getHealthColor(v.worstPct);
          const circumference = 2 * Math.PI * 42;
          const dashOffset = circumference - (circumference * Math.min(v.utilPct, 100) / 100);
          return (
            <div key={v.key} className={`xv-vertical-card ${selectedVKey === v.key ? 'selected' : ''}`} onClick={() => { setSelectedVKey(selectedVKey === v.key ? null : v.key); setSelectedDisc(null); }}>
              <div className="xv-card-head">
                <span className="xv-card-icon">{v.icon}</span>
                <span className="xv-card-name">{v.label}</span>
                {allRisks.filter(r => r.vKey === v.key).length > 0 && <span className="xv-risk-badge">⚠ {allRisks.filter(r => r.vKey === v.key).length}</span>}
                {(allAlertCounts[v.key]?.promoted || 0) > 0 && <span className="xv-risk-badge" style={{color:'#3b82f6',background:'rgba(59,130,246,0.12)'}}>{IC.alert(12)} {allAlertCounts[v.key].promoted}</span>}
              </div>
              <div className="xv-card-ring">
                <svg viewBox="0 0 100 100">
                  <circle cx="50" cy="50" r="42" fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="8" />
                  <circle cx="50" cy="50" r="42" fill="none" stroke={healthColor} strokeWidth="8"
                    strokeDasharray={circumference} strokeDashoffset={dashOffset}
                    strokeLinecap="round" transform="rotate(-90 50 50)"
                    style={{transition:'all 0.8s ease'}} />
                  <text x="50" y="46" textAnchor="middle" fontSize="18" fontWeight="800" fill="var(--text)">{v.utilPct}%</text>
                  <text x="50" y="60" textAnchor="middle" fontSize="7" fill="var(--text2)">UTILIZATION</text>
                </svg>
              </div>
              <div className="xv-card-stats">
                <span>{v.projectCount} projects · {v.roadmapCount} in roadmap</span>
              </div>
              <div className="xv-card-pills">
                {v.inProgress > 0 && <span className="xv-pill xv-pill-active">{v.inProgress} in progress</span>}
                {v.paused > 0 && <span className="xv-pill xv-pill-paused">{v.paused} paused</span>}
              </div>
            </div>
          );
        })}
      </div>

      {/* Row 2: Aggregate Capacity + Portfolio Risk */}
      <div className="xv-row">
        {/* Aggregate Capacity */}
        <div className="exec-card">
          <div className="exec-card-header">🔋 Aggregate Capacity</div>
          {DISCIPLINES.map(d => {
            const cap = aggregateData.totalCap[d];
            const used = Math.round(aggregateData.totalUsed[d] * 10) / 10;
            const pct = cap > 0 ? Math.round((used / cap) * 100) : 0;
            return (
              <div key={d} className="xv-agg-bar">
                <div className="xv-agg-label" style={{color: DISC_COLORS[d]}}>{DISC_LABELS[d]}</div>
                <div className="xv-agg-track">
                  {verticalBreakdown.map(v => {
                    const vUsed = v.bufferedUsed[d] || 0;

                      <div key={v.key} className="xv-agg-seg" style={{width:`${segPct}%`, background: v.color}} title={`${v.label}: ${Math.round(vUsed*10)/10} SP`} />

                  })}
                </div>
                <div className="xv-agg-val" style={{color: getHealthColor(pct)}}>{used}/{cap} SP</div>
              </div>
            );

          <div className="xv-agg-legend">
            {verticalBreakdown.map(v => (
              <span key={v.key} className="xv-agg-legend-item">
                <span className="xv-legend-dot" style={{background: v.color}} />
                {v.label}
              </span>
            ))}
          </div>
        </div>

        {/* Portfolio Risk Radar */}
        <div className="exec-card">

                <button key={v.key} className={`xv-filter-pill ${riskFilter === v.key ? 'active' : ''}`} onClick={() => setRiskFilter(riskFilter === v.key ? 'all' : v.key)}>
                  {v.icon} {v.label}
                </button>
              ))}
            </div>
            <div style={{maxHeight:360,overflowY:'auto'}}>

                const quarterlyRisks = filtered.filter(r => r.type === 'quarterly');
                // Unique key for each risk
                const riskKey = (r) => `${r.type}-${r.vKey}-${r.disc}-${r.quarter||''}-${r.trackKey||''}`;

                  const rk = riskKey(r);
                  const handleClick = () => {
                    if (r.type === 'overall') {
                      setSelectedVKey(r.vKey); setSelectedDisc(r.disc); setSelectedQuarterlyRisk(null);

                      setSelectedVKey(r.vKey); setSelectedDisc(null); setSelectedQuarterlyRisk(r);
                    }
                  };
                  return (
                    <div key={rk + '-' + i}>
                      <div className={`exec-risk-row severity-${r.severity}`}

                        <div className="exec-risk-dot" style={{background: r.severity === 'high' ? '#e17055' : '#fdcb6e'}} />
                        <div style={{flex:1}}>
                          <div className="exec-risk-text">

                          <div className="exec-risk-sub">{r.text}</div>
                        </div>
                        <span style={{fontSize:9,color:'var(--text2)',opacity:0.4,flexShrink:0}}>→</span>
                      </div>
                    </div>
                  );
                };
                const renderVerticalGroup = (vKey) => {
                  const vInfo = verticalBreakdown.find(vb => vb.key === vKey);
                  if (!vInfo) return null;
                  const vOverall = overallRisks.filter(r => r.vKey === vKey);
                  const vQuarterly = quarterlyRisks.filter(r => r.vKey === vKey);
                  // Group quarterly by quarter
                  const qGroups = {};
                  vQuarterly.forEach(r => { (qGroups[r.quarter] = qGroups[r.quarter] || []).push(r); });
                  return (
                    <div key={vKey} style={{marginBottom:10}}>
                      <div style={{fontSize:10,fontWeight:700,color:'var(--text)',padding:'4px 0 4px 2px',display:'flex',alignItems:'center',gap:4}}>
                        {vInfo.icon} {vInfo.label}

                      {vOverall.length > 0 && vOverall.map((r, i) => renderRiskRow(r, i))}

                        <div key={qLabel}>
                          <div style={{fontSize:9,fontWeight:600,color:'var(--text2)',padding:'6px 0 2px 6px',opacity:0.6,letterSpacing:'0.3px'}}>
                            ⏱ {qLabel}
                          </div>
                          {qGroups[qLabel].map((r, i) => renderRiskRow(r, i))}
                        </div>
                      ))}
                    </div>
                  );
                };
                if (riskFilter === 'all') {
                  const vKeys = [...new Set(filtered.map(r => r.vKey))];
                  return vKeys.map(vk => renderVerticalGroup(vk));
                } else {
                  return renderVerticalGroup(riskFilter);
                }
              })()}
            </div>
          </>)}
        </div>
      </div>

      {/* Row 3: Quarterly Delivery Timeline */}

                    const shown = isExpanded ? v.projects : v.projects.slice(0, 8);
                    const hasMore = v.projects.length > 8;

                          const next = new Set(prev);
                          next.has(groupKey) ? next.delete(groupKey) : next.add(groupKey);
                          return next;
                        })}>
                          {isExpanded ? 'Show less' : `+${v.projects.length - 8} more`}

                      <div className="exec-mini-bar" style={{width:'100%'}}>

                    <div className="exec-bar-count">{s.count}</div>
                  </div>

            return sprints[focusDisc] > 0;

                      <text x="50" y="46" textAnchor="middle" fontSize="16" fontWeight="800" fill="var(--text)">{pct}%</text>

                    <div style={{display:'flex',justifyContent:'center',gap:20,marginTop:8}}>

                        <div style={{fontSize:9,color:'var(--text2)'}}>USED (SP)</div>

                      <div style={{textAlign:'center'}}>

                          <circle cx="50" cy="50" r="42" fill="none" stroke={color} strokeWidth="7"

                        <div style={{fontSize:9,color:'var(--text2)'}}>{used}/{cap} SP</div>

                    <div style={{fontSize:18,fontWeight:700,color:'var(--text)'}}>{sv.notStarted}</div>

                  </div>
                </div>

                    const cap = sv.capacity[d] || 0;
                    const used = Math.round((sv.bufferedUsed[d] || 0) * 10) / 10;
                    if (cap <= 0 || used <= cap) return null;
                    const overBy = Math.round((used - cap) * 10) / 10;
                    return (
                      <div key={d} className="exec-risk-row severity-high" style={{margin:'0 0 4px',cursor:'pointer'}} onClick={() => setSelectedDisc(d)}>

                        <div>
                          <div className="exec-risk-text"><strong>{DISC_LABELS[d]}</strong></div>
                          <div className="exec-risk-sub">{used}/{cap} SP (+{overBy} over) — tap to see projects</div>

function NumInput({ value, onCommit, integer, ...props }) {
  const [local, setLocal] = React.useState(String(value ?? ''));
  const prevValue = React.useRef(value);
  if (prevValue.current !== value && String(value ?? '') !== local) {
    setLocal(String(value ?? ''));
  }
  prevValue.current = value;
  return React.createElement('input', {
    type: 'number',
    ...props,
    value: local,
    onFocus: e => e.target.select(),
    onChange: e => {
      const v = e.target.value;
      setLocal(v);
      if (v !== '' && !isNaN(v)) {
        onCommit(integer ? (parseInt(v) || 0) : (parseFloat(v) || 0));
      }
    },
    onBlur: () => {
      if (local === '' || isNaN(local)) {
        onCommit(0);
        setLocal('0');
      }
    }
  });
}

function buildJiraUrl(nvrd) {
  if (!nvrd || typeof nvrd !== 'string') return null;
  const clean = nvrd.replace(/\s/g, '');
  const prefix = clean.split('-')[0];
  if (!prefix) return null;
  return `https://novibetgr.atlassian.net/jira/polaris/projects/${prefix}/ideas/view/4244630?selectedIssue=${clean}`;
}

function App({ onLogout, user: authUser }) {
  // Auth headers for API requests (audit logging) — reads from localStorage to avoid dependency issues
  // Unique ID for this browser tab — used to skip own WS broadcasts
  const wsIdRef = useRef(Math.random().toString(36).slice(2, 10));

  const getAuthHeaders = () => {
    const h = { 'Content-Type': 'application/json', 'X-WS-ID': wsIdRef.current };
    try {
      const stored = localStorage.getItem('cp_google_auth');
      if (stored) {
        const data = JSON.parse(stored);
        if (data.credential) h['Authorization'] = `Bearer ${data.credential}`;
        if (data.email) h['X-User-Email'] = data.email;
        if (data.name) h['X-User-Name'] = encodeURIComponent(data.name);
        if (data.picture) h['X-User-Picture'] = data.picture;
      }
    } catch {}
    return h;
  };

  const getAuthToken = () => {
    try {
      const stored = localStorage.getItem('cp_google_auth');
      if (stored) {
        const data = JSON.parse(stored);
        return data.credential || null;
      }
    } catch {}
    return null;
  };

  const handleAuthError = (resp) => {
    if (resp.status === 401) {
      console.warn('[auth] Received 401, clearing auth and reloading');
      localStorage.removeItem('cp_google_auth');
      window.location.reload();
      return true;
    }
    return false;
  };

  const [activeVertical, setActiveVertical] = useState(() => localStorage.getItem('cp_vertical') || '__executive__');
  useEffect(() => { if (activeVertical !== '__executive__') localStorage.setItem('cp_vertical', activeVertical); }, [activeVertical]);
  const [sizeMap, setSizeMap] = useState({...CP.DEFAULT_SIZE_MAP});

  const [qTip, setQTip] = useState(null);

  const [saving, setSaving] = useState(false);

        // Merge with BUILTIN_VERTICALS to ensure label/color/icon exist (safe during deploy rollout)
        const merged = data.map(v => {

        }).filter(v => v.label && v.icon);

            const msg = JSON.parse(evt.data);
            // Keepalive — respond to server pings to keep connection alive
            if (msg.type === 'ping') {
              if (ws.readyState === 1) ws.send(JSON.stringify({ type: 'pong' }));
              return;
            }
            if (msg.type === 'update' && msg.vertical === activeVertical) {
              // Skip updates we triggered ourselves
              if (msg.senderId === wsIdRef.current) return;
              // Ignore Masterplan updates when working on a snapshot
              if (activeWorkspaceRef.current.type === 'snapshot') return;
              console.log('[ws] Received full state update from another user');
              // Cancel any pending debounced save — server has newer data
              if (saveTimer.current) {
                clearTimeout(saveTimer.current);
                saveTimer.current = null;
                pendingSave.current = null;
                console.log('[ws] cancelled pending debounced save');
              }
              if (savingRef.current) {
                console.log('[ws] save in-flight, deferring sync');
                deferredSyncRef.current = 'ws update (deferred)';
                return;
              }
              // Apply state DIRECTLY from the WS message — no HTTP fetch needed!
              if (msg.state) {
                applyStateFromServer(activeVertical, msg.state);
                if (msg.state.updatedAt) lastAppliedUpdatedAt.current = msg.state.updatedAt;
              }
              if (msg.projects) {
                setVerticalData(prev => ({ ...prev, [activeVertical]: msg.projects }));
              }
            }
          } catch (e) {
            console.log('[ws] message parse error:', e.message);
          }
        };

        ws.onclose = () => {
          console.log('[ws] Disconnected, reconnecting in 3s');
          wsRef.current = null;
          if (!cancelled) reconnectTimer = setTimeout(connectWs, 3000);
        };

        ws.onerror = () => {
          // onclose will fire after this
        };
      } catch (e) {
        console.log('[ws] Connection failed:', e.message);
        if (!cancelled) reconnectTimer = setTimeout(connectWs, 5000);
      }
    };

    connectWs();

    // ── Slow fallback poll (in case WS is down) ──
    const fallbackPoll = async () => {
      if (cancelled || dragItem.current || savingRef.current) return;
      if (activeWorkspaceRef.current.type === 'snapshot') return;
      try {
        const _t = Date.now();
        const pollRes = await fetch(`${API_URL}/api/verticals/${activeVertical}/poll?_t=${_t}`, { headers: getAuthHeaders(), cache: 'no-store' }).then(r => r.json());
        if (pollRes.updatedAt && pollRes.updatedAt !== lastAppliedUpdatedAt.current) {
          await loadVertical(activeVertical);
          lastAppliedUpdatedAt.current = pollRes.updatedAt;
        }
      } catch (e) {}
    };
    const fallbackInterval = setInterval(fallbackPoll, FALLBACK_POLL_INTERVAL);

    // Immediately sync when tab becomes visible
    const onVisibilityChange = () => {
      if (!document.hidden && !cancelled) {
        if (activeWorkspaceRef.current.type === 'snapshot') return;
        fetchAndApply('tab visible');
        // Re-subscribe in case WS reconnected to a different vertical
        if (wsRef.current && wsRef.current.readyState === 1) {
          wsRef.current.send(JSON.stringify({ type: 'subscribe', vertical: activeVertical, token: getAuthToken() }));
        }
      }
    };
    document.addEventListener('visibilitychange', onVisibilityChange);

    // Initial load
    fetchAndApply('initial');

    return () => {
      cancelled = true;
      clearInterval(fallbackInterval);
      clearTimeout(reconnectTimer);
      if (ws) ws.close();
      wsRef.current = null;
      document.removeEventListener('visibilitychange', onVisibilityChange);

  const handleDragLeave = (e) => { if (!e.currentTarget.contains(e.relatedTarget)) e.currentTarget.classList.remove('drag-over'); };

  const handleDropOnTrack = (e, trackKey) => {
    e.preventDefault(); e.currentTarget.classList.remove('drag-over');
    document.querySelectorAll('.drop-indicator').forEach(el => el.remove());
    if (!dragItem.current) return;
    const draggedId = dragItem.current;
    const isGhostDrag = String(draggedId).startsWith('ghost:');

    // Determine drop position: before first block or after last block
    const blocks = e.currentTarget.querySelectorAll('.project-block');
    let insertIdx;
    if (blocks.length === 0) {
      insertIdx = 0;
    } else {
      const firstRect = blocks[0].getBoundingClientRect();
      if (e.clientX < firstRect.left + firstRect.width / 2) {
        insertIdx = 0; // dropped before the first block
      } else {
        insertIdx = undefined; // append to end
      }
    }

    // Move in tracks array (only for real projects, not ghosts)
    if (!isGhostDrag) {
      moveToTrack(draggedId, trackKey, insertIdx);
    }

    // Update trackBlockOrder so visual order persists (works for both real and ghost blocks)
    const combined = getCombinedOrder(trackKey);
    const dragKey = String(draggedId);
    const filtered = combined.filter(k => k !== dragKey);
    if (insertIdx === 0) {
      filtered.unshift(dragKey); // beginning
    } else {
      filtered.push(dragKey); // end
    }
    saveBlockOrder(trackKey, filtered);
  };

  // Build combined block order for a track (regular + ghosts)
  const getCombinedOrder = useCallback((trackKey) => {
    const realIds = (tracks[trackKey] || []).map(id => String(id));
    const ghostIds = (ghostsByTrack[trackKey] || []).map(g => `ghost:${g.project.id}`);
    const all = [...realIds, ...ghostIds];
    const order = trackBlockOrder[trackKey];
    if (order && order.length > 0) {
      all.sort((a, b) => {
        const aIdx = order.indexOf(a);
        const bIdx = order.indexOf(b);
        if (aIdx === -1 && bIdx === -1) return 0;
        if (aIdx === -1) return 1;
        if (bIdx === -1) return 1;
        return aIdx - bIdx;
      });
    }
    return all;
  }, [tracks, ghostsByTrack, trackBlockOrder]);

    setVerticalStatesWithUndo(prev => {

  const handleDropOnBlock = (e, trackKey, blockId, blockIndex) => {

    document.querySelectorAll('.drop-indicator').forEach(el => el.remove());
    if (!dragItem.current || dragItem.current === blockId) return;
    const draggedId = dragItem.current;
    const isGhostDrag = String(draggedId).startsWith('ghost:');

    if (!isGhostDrag) {
      // Regular project drag — still use moveToTrack for cross-track moves
      const rect = e.currentTarget.getBoundingClientRect();
      const dropAfter = (e.clientX - rect.left) > rect.width / 2;
      const insertIdx = dropAfter ? blockIndex + 1 : blockIndex;
      const currentTrackIds = tracks[trackKey] || [];
      const currentIdx = currentTrackIds.indexOf(draggedId);
      let adjustedIdx = insertIdx;
      if (currentIdx !== -1 && currentIdx < insertIdx) adjustedIdx = insertIdx - 1;
      moveToTrack(draggedId, trackKey, adjustedIdx);
    }

    // Update combined block order for visual ordering
    const combined = getCombinedOrder(trackKey);
    const dragKey = isGhostDrag ? String(draggedId) : String(draggedId);
    const filtered = combined.filter(k => k !== dragKey);
    const rect = e.currentTarget.getBoundingClientRect();
    const dropAfter = (e.clientX - rect.left) > rect.width / 2;
    const targetKey = String(blockId).startsWith('ghost:') ? String(blockId) : String(blockId);
    const targetIdx = filtered.indexOf(targetKey);
    const insertAt = targetIdx === -1 ? filtered.length : (dropAfter ? targetIdx + 1 : targetIdx);
    filtered.splice(insertAt, 0, dragKey);
    saveBlockOrder(trackKey, filtered);

            {isOverflow && <span className="block-info-tag overflow" title={`Exceeds ${overflowDisciplines.join(', ')} capacity`}>⚠{overflowDisciplines.map(d => d.charAt(0).toUpperCase()).join('·')}</span>}
            {commentCounts[p.id] > 0 && <span className="block-info-tag comments">{IC.chat(12)}{commentCounts[p.id]}</span>}
            {alertCounts.byProject && alertCounts.byProject[String(p.id)] > 0 && <span className="block-info-tag alerts">⚠{alertCounts.byProject[String(p.id)]}</span>}
            <span className="block-sprints"
              onClick={lane === 'backlog' && isEditor ? (e) => {
                e.stopPropagation();
                const rect = e.currentTarget.getBoundingClientRect();
                setSprintEditor({ projectId: p.id, x: rect.left, y: rect.bottom + 4 });
              } : undefined}
              style={lane === 'backlog' && isEditor ? { cursor: 'pointer', textDecoration: 'underline dotted', textUnderlineOffset: 2 } : {}}
              title={lane === 'backlog' && isEditor ? 'Click to set sprint overrides' : undefined}
            >{hasSplits && isTrack ? `${eff.total}/${s.total}sp` : `${s.total}sp`}{p.sprintOverrides && Object.keys(p.sprintOverrides).length > 0 ? '*' : ''}</span>
          </div>
        </div>
        {CP.getProjectStatus(p) === 'paused' && <div className="pause-overlay">⏸</div>}
        {(CP.getProjectStatus(p) === 'in_progress' || CP.getProjectStatus(p) === 'paused') && CP.getPercentComplete(p) > 0 && (
          <div className="block-progress-bar">
            <div className={`block-progress-fill ${CP.getProjectStatus(p) === 'paused' ? 'paused' : ''}`} style={{width: `${CP.getPercentComplete(p)}%`}} />
          </div>
        )}
        {isTrack && isEditor && (
          <button className="block-settings"
            onClick={(e) => { e.stopPropagation(); setSettingsModal({ projectId: p.id, projectName: p.subTask, homeTrack: trackKey, tab: 'general' }); }}
            title="Project settings">
            {IC.gear(14)}
          </button>
