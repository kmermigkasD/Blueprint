        {isEditor && <button className="block-move"
          onClick={(e) => { e.stopPropagation(); if (lane === 'backlog') { const r = e.currentTarget.getBoundingClientRect(); setTrackPicker({ projectId: p.id, x: r.left - 140, y: r.bottom + 4 }); } else { moveToBacklog(p.id); } }}
          title={lane === 'backlog' ? 'Add to Roadmap' : 'Remove from Roadmap'}>
          {lane === 'backlog' ? '＋' : IC.close(14)}
        </button>}
      </div>
    );
  };

  const renderGhostBlock = (p, splitSizing, trackKey, homeTrack, blockIndex) => {
    if (!p || !splitSizing) return null;
    const totalSp = (splitSizing.backend || 0) + (splitSizing.frontend || 0) + (splitSizing.natives || 0);
    const w = Math.max(MIN_WIDTH, Math.min(MAX_WIDTH, totalSp * PX_PER_SPRINT));
    const homeLabel = TRACKS.find(t => t.key === homeTrack)?.label || homeTrack;
    // Check overflow for ghost blocks too
    const overflowDisciplines = (trackOverflow[trackKey] && trackOverflow[trackKey][`ghost-${p.id}`]) || null;
    const isOverflow = overflowDisciplines && overflowDisciplines.length > 0;
    // Independent ghost status
    const ghostStatus = CP.getSplitStatus(splitStatuses, p.id, trackKey);
    const ghostPct = CP.getSplitPercentComplete(splitStatuses, p.id, trackKey);
    return (
      <div key={`ghost-${p.id}`}
        className={`project-block ghost-block ${isOverflow ? 'overflow-block' : ''} ${ghostStatus === 'in_progress' ? 'in-progress' : ''} ${ghostStatus === 'paused' ? 'paused' : ''}`}
        style={{ width: w, height: BLOCK_HEIGHT, background: getBlockBg(p.pillar, pillarColorMap), cursor: isEditor ? 'grab' : 'default' }}
        draggable={isEditor}
        onDragStart={isEditor ? (e) => { dragItem.current = `ghost:${p.id}`; dragSource.current = 'roadmap'; e.dataTransfer.effectAllowed = 'move'; setTimeout(() => e.target.classList.add('dragging'), 0); } : undefined}
        onDragEnd={isEditor ? handleDragEnd : undefined}
        onDragOver={isEditor ? (e) => handleDragOverBlock(e, trackKey, `ghost:${p.id}`) : undefined}
        onDrop={isEditor ? (e) => handleDropOnBlock(e, trackKey, `ghost:${p.id}`, blockIndex) : undefined}
        onClick={() => openCommentsSidebar(p.id, p.subTask, { project: p, trackKey })}
        onMouseEnter={(e) => handleMouseEnter(e, p, trackKey)}
        onMouseLeave={handleMouseLeave}
      >
        <div className="ghost-link-icon">🔗</div>
        <div className="block-content">
          <div className="block-title">{p.subTask}</div>
          <div className="block-bottom">
            <span className="ghost-origin">{IC.extLink(12)} {homeLabel}</span>
            {p.nvrd && <span className="block-jira">{p.nvrd}</span>}
            {isOverflow && <span className="block-info-tag overflow" title={`Exceeds ${overflowDisciplines.join(', ')} capacity`}>⚠{overflowDisciplines.map(d => d.charAt(0).toUpperCase()).join('·')}</span>}
            {commentCounts[p.id] > 0 && <span className="block-info-tag comments">{IC.chat(12)}{commentCounts[p.id]}</span>}
            {alertCounts.byProject && alertCounts.byProject[String(p.id)] > 0 && <span className="block-info-tag alerts">⚠{alertCounts.byProject[String(p.id)]}</span>}
            <span className="block-sprints">{totalSp}sp</span>
          </div>
        </div>
        {ghostStatus === 'paused' && <div className="pause-overlay">⏸</div>}
        {(ghostStatus === 'in_progress' || ghostStatus === 'paused') && ghostPct > 0 && (
          <div className="block-progress-bar">
            <div className={`block-progress-fill ${ghostStatus === 'paused' ? 'paused' : ''}`} style={{width: `${ghostPct}%`}} />
          </div>
        )}
        {isEditor && (
          <button className="block-settings"
            onClick={(e) => { e.stopPropagation(); setSettingsModal({ projectId: p.id, projectName: p.subTask, homeTrack: homeTrack, tab: 'general', isGhost: true, ghostTargetTrack: trackKey }); }}
            title="Split settings">
            {IC.gear(14)}
          </button>
        )}
        {isEditor && <button className="block-move"
          onClick={(e) => { e.stopPropagation(); removeSplit(p.id, trackKey); }}
          title="Remove split">
          {IC.close(14)}
        </button>}
      </div>
    );
  };

  const ghostsByTrack = useMemo(() => {
    try {
      return CP.computeGhostsByTrack(splits, projectById, tracks, trackKeys);
    } catch (err) {
      console.error('ghostsByTrack error:', err, 'splits:', JSON.stringify(splits));
      const result = {};
      for (const t of TRACKS) result[t.key] = [];
      return result;
    }
  }, [splits, projectById, tracks, trackKeys]);

  const FilterDropdown = ({ filterKey, label }) => {
    const values = uniqueValues[filterKey];
    const selected = filters[filterKey];
    const mode = filterModes[filterKey] || 'include';
    const isOpen = openFilter === filterKey;
    const btnClass = selected.length ? (mode === 'exclude' ? 'active-exclude' : 'active') : '';
    return (
      <div className="filter-group">
        <button className={`filter-btn ${btnClass}`}
          onClick={(e) => { e.stopPropagation(); setOpenFilter(isOpen ? null : filterKey); }}>
          {label}
          {selected.length > 0 && <span className="count">{selected.length}</span>}
          {IC.chevron(10)}
        </button>
        <div className={`filter-dropdown ${isOpen ? 'open' : ''}${mode === 'exclude' ? ' exclude' : ''}`}>
          <div className="filter-mode-toggle">
            <button className={`filter-mode-btn${mode === 'include' ? ' active' : ''}`}
              onClick={e => { e.stopPropagation(); setFilterModes(prev => ({...prev, [filterKey]: 'include'})); }}>Include</button>
            <button className={`filter-mode-btn${mode === 'exclude' ? ' active-exclude' : ''}`}
              onClick={e => { e.stopPropagation(); setFilterModes(prev => ({...prev, [filterKey]: 'exclude'})); }}>Exclude</button>
          </div>
          {values.map(v => (
            <label key={v} className="filter-option">
              <input type="checkbox" checked={selected.includes(v)} onChange={() => toggleFilter(filterKey, v)} />
              {v}
            </label>
          ))}
        </div>
      </div>
    );
  };

  const trackProjects = useMemo(() => {
    const result = {};
    const filtered = new Set(filterProjects(currentData).map(p => p.id));
    for (const t of TRACKS) {
      result[t.key] = (tracks[t.key] || []).map(id => projectById[id]).filter(p => p && filtered.has(p.id));
    }
    return result;
  }, [tracks, projectById, filterProjects, currentData]);

  const trackUsed = useMemo(() => CP.computeTrackUsed(trackProjects, ghostsByTrack, splits, sizeMap, trackKeys), [trackProjects, ghostsByTrack, splits, sizeMap, trackKeys]);

  const unallocated = useMemo(() => CP.computeUnallocated(capacity, trackCapacity), [capacity, trackCapacity]);

  // Effective track capacity: sum quarterly allocations when available, else flat
  const effectiveTrackCapacity = useMemo(() => {
    const result = {};
    for (const tk of trackKeys) {
      const hasQtc = quarterKeys.some(qk => quarterlyTrackCapacity[qk] && quarterlyTrackCapacity[qk][tk]);
      result[tk] = hasQtc
        ? quarterKeys.reduce((sum, qk) => {
            const qtc = (quarterlyTrackCapacity[qk] && quarterlyTrackCapacity[qk][tk]) || {};
            for (const d of ['backend','frontend','natives']) sum[d] = (sum[d] || 0) + (qtc[d] || 0);
            return sum;
          }, {backend:0,frontend:0,natives:0})
        : trackCapacity[tk] || {backend:0,frontend:0,natives:0};
    }
    return result;
  }, [trackCapacity, quarterlyTrackCapacity, quarterKeys, trackKeys]);

  const trackOverflow = useMemo(() => CP.computeTrackOverflow(trackProjects, effectiveTrackCapacity, ghostsByTrack, trackBlockOrder, splits, sizeMap, trackKeys), [trackProjects, effectiveTrackCapacity, ghostsByTrack, trackBlockOrder, splits, sizeMap, trackKeys]);

  // ── Timeline helpers ──
  const updateTimelineConfig = useCallback((updates) => {
    setVerticalStatesWithUndo(prev => {
      const tc = { ...(prev[activeVertical].timelineConfig || DEFAULT_TIMELINE_CONFIG), ...updates };
      const newState = { ...prev, [activeVertical]: { ...prev[activeVertical], timelineConfig: tc } };
      debouncedSave(activeVertical, newState[activeVertical]);
      return newState;
    });
  }, [activeVertical, debouncedSave, setVerticalStatesWithUndo]);

  const addMilestone = useCallback((name, date, color) => {
    setVerticalStatesWithUndo(prev => {
      const ms = [...(prev[activeVertical].milestones || [])];
      const id = ms.length > 0 ? Math.max(...ms.map(m => m.id)) + 1 : 1;
      ms.push({ id, name, date, color: color || MILESTONE_COLORS[ms.length % MILESTONE_COLORS.length] });
      const newState = { ...prev, [activeVertical]: { ...prev[activeVertical], milestones: ms } };
      debouncedSave(activeVertical, newState[activeVertical]);
      return newState;
    });
  }, [activeVertical, debouncedSave, setVerticalStatesWithUndo]);

  const updateMilestone = useCallback((id, updates) => {
    setVerticalStatesWithUndo(prev => {
      const ms = (prev[activeVertical].milestones || []).map(m => m.id === id ? { ...m, ...updates } : m);
      const newState = { ...prev, [activeVertical]: { ...prev[activeVertical], milestones: ms } };
      debouncedSave(activeVertical, newState[activeVertical]);
      return newState;
    });
  }, [activeVertical, debouncedSave, setVerticalStatesWithUndo]);

  const removeMilestone = useCallback((id) => {
    setVerticalStatesWithUndo(prev => {
      const ms = (prev[activeVertical].milestones || []).filter(m => m.id !== id);
      const newState = { ...prev, [activeVertical]: { ...prev[activeVertical], milestones: ms } };
      debouncedSave(activeVertical, newState[activeVertical]);
      return newState;
    });
  }, [activeVertical, debouncedSave, setVerticalStatesWithUndo]);

  const updateTimelineOverride = useCallback((projectId, trackKey, updates) => {
    setVerticalStatesWithUndo(prev => {
      const overrides = { ...(prev[activeVertical].timelineOverrides || {}) };
      const key = `${trackKey}:${projectId}`;
      overrides[key] = { ...(overrides[key] || {}), ...updates };
      const newState = { ...prev, [activeVertical]: { ...prev[activeVertical], timelineOverrides: overrides } };
      // Save immediately (not debounced) — only fires on mouseup so no rapid-fire risk
      if (saveTimer.current) { clearTimeout(saveTimer.current); saveTimer.current = null; pendingSave.current = null; }
      saveState(activeVertical, newState[activeVertical]);
      return newState;
    });
  }, [activeVertical, saveState, setVerticalStatesWithUndo]);

  const clearTimelineOverride = useCallback((projectId, trackKey) => {
    setVerticalStatesWithUndo(prev => {
      const overrides = { ...(prev[activeVertical].timelineOverrides || {}) };
      delete overrides[`${trackKey}:${projectId}`];
      const newState = { ...prev, [activeVertical]: { ...prev[activeVertical], timelineOverrides: overrides } };
      if (saveTimer.current) { clearTimeout(saveTimer.current); saveTimer.current = null; pendingSave.current = null; }
      saveState(activeVertical, newState[activeVertical]);
      return newState;
    });
  }, [activeVertical, saveState, setVerticalStatesWithUndo]);

  // Sub-lane management
  const addSubLane = useCallback((trackKey) => {
    setVerticalStatesWithUndo(prev => {
      const counts = { ...(prev[activeVertical].trackSubLaneCounts || {}) };
      counts[trackKey] = (counts[trackKey] || 1) + 1;
      const newState = { ...prev, [activeVertical]: { ...prev[activeVertical], trackSubLaneCounts: counts } };
      if (saveTimer.current) { clearTimeout(saveTimer.current); saveTimer.current = null; pendingSave.current = null; }
      saveState(activeVertical, newState[activeVertical]);
      return newState;
    });
  }, [activeVertical, saveState, setVerticalStatesWithUndo]);

  const removeSubLane = useCallback((trackKey) => {
    setVerticalStatesWithUndo(prev => {
      const counts = { ...(prev[activeVertical].trackSubLaneCounts || {}) };
      if ((counts[trackKey] || 1) <= 1) return prev;
      counts[trackKey] = counts[trackKey] - 1;
      // Move projects from removed lane to last valid lane
      const assignments = { ...(prev[activeVertical].timelineLaneAssignments || {}) };
      for (const key in assignments) {
        if (key.startsWith(trackKey + ':') && assignments[key] >= counts[trackKey]) {
          assignments[key] = counts[trackKey] - 1;
        }
      }
      const newState = { ...prev, [activeVertical]: { ...prev[activeVertical], trackSubLaneCounts: counts, timelineLaneAssignments: assignments } };
      if (saveTimer.current) { clearTimeout(saveTimer.current); saveTimer.current = null; pendingSave.current = null; }
      saveState(activeVertical, newState[activeVertical]);
      return newState;
    });
  }, [activeVertical, saveState, setVerticalStatesWithUndo]);

  const updateLaneAssignment = useCallback((projectId, trackKey, laneIndex) => {
    setVerticalStatesWithUndo(prev => {
      const assignments = { ...(prev[activeVertical].timelineLaneAssignments || {}) };
      const key = `${trackKey}:${projectId}`;
      if (laneIndex === 0) delete assignments[key];
      else assignments[key] = laneIndex;
      const newState = { ...prev, [activeVertical]: { ...prev[activeVertical], timelineLaneAssignments: assignments } };
      if (saveTimer.current) { clearTimeout(saveTimer.current); saveTimer.current = null; pendingSave.current = null; }
      saveState(activeVertical, newState[activeVertical]);
      return newState;
    });
  }, [activeVertical, saveState, setVerticalStatesWithUndo]);

  // Drag-to-resize state ref
  const dragRef = useRef(null);

  // Compute timeline layout data
  const timelineData = useMemo(() => {
    const sprintWeeks = timelineConfig.sprintDurationWeeks || 2;
    const scale = timelineConfig.timeScale || 'months';
    const startDate = new Date(timelineConfig.sprintStartDate || Date.now());

    // Pixel width per sprint based on scale
    const pxPerSprint = scale === 'weeks' ? PX_PER_SPRINT_WEEK * sprintWeeks
      : scale === 'months' ? PX_PER_SPRINT_WEEK * sprintWeeks * 0.7
      : PX_PER_SPRINT_WEEK * sprintWeeks * 0.35; // quarters

    // Build track bars: { trackKey: [{project, left, width, sprints, trackKey, disciplines}] }
    const trackBars = {};
    let maxPx = 0;
    for (const t of TRACKS) {
      const bars = [];
      let cumSprints = 0;
      for (const pid of (tracks[t.key] || [])) {
        const p = projectById[pid];
        if (!p) continue;
        const eff = effectiveSprints(p);
        const ovKey = `${t.key}:${pid}`;
        const ov = timelineOverrides[ovKey];
        const autoStart = cumSprints;
        const autoSprints = eff.total;
        const startSp = ov && ov.startSprints != null ? ov.startSprints : autoStart;
        const durSp = ov && ov.durationSprints != null ? ov.durationSprints : autoSprints;
        const left = startSp * pxPerSprint;
        const width = Math.max(40, durSp * pxPerSprint);
        const laneIndex = timelineLaneAssignments[`${t.key}:${pid}`] || 0;
        bars.push({ project: p, left, width, sprints: durSp, autoSprints, startSprints: startSp, autoStart, trackKey: t.key, hasOverride: !!ov, disciplines: eff, laneIndex });
        cumSprints = Math.max(cumSprints, startSp + durSp);
        if (!ov) cumSprints = autoStart + autoSprints; // without override, sequential
      }
      // Ghost blocks appended at the end of the track
      for (const g of (ghostsByTrack[t.key] || [])) {
        const totalSp = (g.sizing.backend||0) + (g.sizing.frontend||0) + (g.sizing.natives||0);
        const ovKey = `${t.key}:${g.project.id}`;
        const ov = timelineOverrides[ovKey];
        const autoStart = cumSprints;
        const startSp = ov && ov.startSprints != null ? ov.startSprints : autoStart;
        const durSp = ov && ov.durationSprints != null ? ov.durationSprints : totalSp;
        const left = startSp * pxPerSprint;
        const width = Math.max(40, durSp * pxPerSprint);
        const gLaneIndex = timelineLaneAssignments[`${t.key}:${g.project.id}`] || 0;
        bars.push({ project: g.project, left, width, sprints: durSp, autoSprints: totalSp, startSprints: startSp, autoStart, trackKey: t.key, hasOverride: !!ov, ghost: true, homeTrack: g.homeTrack, disciplines: g.sizing, laneIndex: gLaneIndex });
        cumSprints = Math.max(cumSprints, startSp + durSp);
        if (!ov) cumSprints = autoStart + totalSp;
      }
      trackBars[t.key] = bars;
      const trackMax = bars.reduce((m, b) => Math.max(m, b.left + b.width), 0);
      maxPx = Math.max(maxPx, trackMax);
    }

    const totalWeeks = (maxPx / PX_PER_SPRINT_WEEK) * (scale === 'months' ? 1/0.7 : scale === 'quarters' ? 1/0.35 : 1);

    // Generate ruler marks — ensure at least 15 months (current year + 3 months next year)
    const marks = [];
    const minEndDate = new Date(startDate.getFullYear() + 1, 2, 31); // Mar 31 next year
    const minDays = (minEndDate - startDate) / 86400000;
    const minSprints = minDays / 7 / sprintWeeks;
    const minPx = minSprints * pxPerSprint;
    const totalPx = Math.max(maxPx + 200, minPx);
    if (scale === 'weeks') {
      const weekPx = PX_PER_SPRINT_WEEK;
      const numWeeks = Math.ceil(totalPx / weekPx);
      for (let i = 0; i < numWeeks; i++) {
        const d = new Date(startDate);
        d.setDate(d.getDate() + i * 7);
        marks.push({ label: `W${i+1}`, width: weekPx, date: d });
      }
    } else if (scale === 'months') {
      const monthPx = PX_PER_SPRINT_WEEK * (4.33 / sprintWeeks) * pxPerSprint / PX_PER_SPRINT_WEEK * sprintWeeks;
      // Simpler approach: compute months from start to end
      const d = new Date(startDate);
      let px = 0;
      while (px < totalPx) {
        const nextMonth = new Date(d.getFullYear(), d.getMonth() + 1, 1);
        const daysInMonth = (nextMonth - d) / (1000*60*60*24);
        const weeksInMonth = daysInMonth / 7;
        const w = weeksInMonth / sprintWeeks * pxPerSprint;
        marks.push({ label: d.toLocaleDateString('en-US', { month: 'short', year: '2-digit' }), width: Math.max(60, w), date: new Date(d) });
        px += w;
        d.setMonth(d.getMonth() + 1); d.setDate(1);
      }
    } else { // quarters
      const d = new Date(startDate);
      let px = 0;
      const qNames = ['Q1','Q2','Q3','Q4'];
      while (px < totalPx) {
        const q = Math.floor(d.getMonth() / 3);
        const nextQ = new Date(d.getFullYear(), (q + 1) * 3, 1);
        const daysInQ = (nextQ - d) / (1000*60*60*24);
        const weeksInQ = daysInQ / 7;
        const w = weeksInQ / sprintWeeks * pxPerSprint;
        marks.push({ label: `${qNames[q]} ${d.getFullYear()}`, width: Math.max(80, w), date: new Date(d) });
        px += w;
        d.setTime(nextQ.getTime());
      }
    }

    // Milestone positions (date to px)
    const msPositions = (milestones || []).map(m => {
      const mDate = new Date(m.date);
      const daysDiff = (mDate - startDate) / (1000*60*60*24);
      const weeksDiff = daysDiff / 7;
      const sprintsDiff = weeksDiff / sprintWeeks;
      return { ...m, px: sprintsDiff * pxPerSprint };
    }).filter(m => m.px >= 0);

    return { trackBars, marks, totalPx: totalPx, msPositions, pxPerSprint };
  }, [tracks, projectById, effectiveSprints, ghostsByTrack, timelineConfig, milestones, timelineOverrides, timelineLaneAssignments, trackSubLaneCounts]);

  // ── Per-track per-quarter demand (for capacity warning badges) ──
  const quarterlyOvercap = useMemo(() => {
    if (!timelineData || !timelineData.trackBars) return {};
    const sprintWeeks = timelineConfig.sprintDurationWeeks || 2;
    const startDate = new Date(timelineConfig.sprintStartDate || Date.now());
    const result = {};
    for (const [trackKey, bars] of Object.entries(timelineData.trackBars)) {
      const qDemand = {}; // { "Q1 2026": { backend: 0, ... } }
      const qProjects = {}; // { "Q1 2026": [{ name, id, sprints: {backend, ...} }] }
      for (const bar of bars) {
        const barStartWeeks = bar.startSprints * sprintWeeks;
        const barEndWeeks = (bar.startSprints + bar.sprints) * sprintWeeks;
        const barMidWeeks = (barStartWeeks + barEndWeeks) / 2;
        const midDate = new Date(startDate);
        midDate.setDate(midDate.getDate() + barMidWeeks * 7);
        const q = Math.floor(midDate.getMonth() / 3) + 1;
        const y = midDate.getFullYear();
        const qLabel = `Q${q} ${y}`;
        if (!qDemand[qLabel]) qDemand[qLabel] = { backend: 0, frontend: 0, natives: 0 };
        if (!qProjects[qLabel]) qProjects[qLabel] = [];
        let barSprints = { backend: 0, frontend: 0, natives: 0 };
        if (bar.disciplines) {
          for (const d of ['backend', 'frontend', 'natives']) {
            qDemand[qLabel][d] += (bar.disciplines[d] || 0);
            barSprints[d] = bar.disciplines[d] || 0;
          }
        } else if (bar.project) {
          const sp = effectiveSprints[bar.project.id] || { backend: 0, frontend: 0, natives: 0 };
          for (const d of ['backend', 'frontend', 'natives']) {
            qDemand[qLabel][d] += (sp[d] || 0);
            barSprints[d] = sp[d] || 0;
          }
        }
        const pName = bar.project ? (bar.project.subTask || bar.project.masterEpic || `#${bar.project.id}`) : (bar.label || '?');
        const pId = bar.project ? bar.project.id : null;
        const isGhost = bar.isGhost || false;
        qProjects[qLabel].push({ name: pName, id: pId, sprints: barSprints, isGhost });
      }
      const trackResult = {};
      for (const [qLabel, demand] of Object.entries(qDemand)) {
        const qtcQ = quarterlyTrackCapacity[qLabel];
        const qTc = (qtcQ && qtcQ[trackKey]) || trackCapacity[trackKey] || { backend:0, frontend:0, natives:0 };
        const over = [];
        const overDisciplineKeys = [];
        for (const d of ['backend', 'frontend', 'natives']) {
          const used = Math.round(demand[d] * 10) / 10;
          const cap = qTc[d] || 0;
          if (cap > 0 && used > cap) {
            const label = d === 'backend' ? 'Backend' : d === 'frontend' ? 'Frontend' : 'Natives';
            over.push({ discipline: label, key: d, used, cap, overBy: Math.round((used - cap) * 10) / 10 });
            overDisciplineKeys.push(d);
          }
        }
        if (over.length > 0) {
          // Filter projects to only those contributing to overcapacity disciplines
          const relevantProjects = (qProjects[qLabel] || [])
            .filter(p => overDisciplineKeys.some(d => p.sprints[d] > 0))
            .sort((a, b) => {
              const aTotal = overDisciplineKeys.reduce((s, d) => s + (a.sprints[d] || 0), 0);
              const bTotal = overDisciplineKeys.reduce((s, d) => s + (b.sprints[d] || 0), 0);
              return bTotal - aTotal;
            });
          trackResult[qLabel] = { over, projects: relevantProjects };
        }
      }
      if (Object.keys(trackResult).length > 0) {
        result[trackKey] = trackResult;
      }
    }
    return result;
  }, [timelineData, timelineConfig, effectiveSprints, quarterlyTrackCapacity, trackCapacity]);

  // ── Filtered timeline data for modal views ──
  const filteredTimelineData = useMemo(() => {
    if (!activeModal) return timelineData;
    const hasProjectFilter = modalSearch || Object.values(modalFilters).some(a => a.length > 0);
    const hasTrackFilter = modalTrackFilter.length > 0;
    if (!hasProjectFilter && !hasTrackFilter) return timelineData;
    const filteredTrackBars = {};
    for (const [trackKey, bars] of Object.entries(timelineData.trackBars)) {
      // Track-level filter: include/exclude entire tracks
      if (hasTrackFilter) {
        const trackMatch = modalTrackFilter.includes(trackKey);
        if (modalTrackFilterMode === 'exclude' ? trackMatch : !trackMatch) {
          filteredTrackBars[trackKey] = [];
          continue;
        }
      }
      // Project-level filter (existing logic)
      filteredTrackBars[trackKey] = hasProjectFilter
        ? bars.filter(bar => CP.filterProjects([bar.project], modalSearch, modalFilters, modalFilterModes).length > 0)
        : bars;
    }
    return { ...timelineData, trackBars: filteredTrackBars };
  }, [activeModal, modalSearch, modalFilters, modalFilterModes, modalTrackFilter, modalTrackFilterMode, timelineData]);

  // Quarterly view data — maps roadmap projects to rolling 4 quarters
  const quarterlyData = useMemo(() => {
    const sprintWeeks = timelineConfig.sprintDurationWeeks || 2;
    const sprintStartDate = new Date(timelineConfig.sprintStartDate || Date.now());

    // Build rolling 4 quarters from current quarter
    const now = new Date();
    const curQ = Math.floor(now.getMonth() / 3);
    const curYear = now.getFullYear();
    const quarters = [];
    for (let i = 0; i < 4; i++) {
      const q = (curQ + i) % 4;
      const y = curYear + Math.floor((curQ + i) / 4);
      const start = new Date(y, q * 3, 1);
      const end = new Date(y, q * 3 + 3, 0, 23, 59, 59);
      quarters.push({ label: `Q${q + 1} ${y}`, start, end, projects: [] });
    }
    const qStart = quarters[0].start;
    const qEnd = quarters[3].end;

    // Collect all bars and merge core + ghost per project (earliest start, latest end)
    const projectSpans = new Map(); // projectId -> {project, minStart, maxEnd, ghostTrackKeys}
    if (filteredTimelineData && filteredTimelineData.trackBars) {
      for (const bars of Object.values(filteredTimelineData.trackBars)) {
        for (const bar of bars) {
          const pid = bar.project.id;
          const endSp = bar.startSprints + bar.sprints;
          if (!projectSpans.has(pid)) {
            projectSpans.set(pid, { project: bar.project, minStart: bar.startSprints, maxEnd: endSp, ghostTrackKeys: bar.ghost ? [bar.trackKey] : [] });
          } else {
            const span = projectSpans.get(pid);
            span.minStart = Math.min(span.minStart, bar.startSprints);
            span.maxEnd = Math.max(span.maxEnd, endSp);
            if (bar.ghost && bar.trackKey) span.ghostTrackKeys.push(bar.trackKey);
          }
        }
      }
    }

    // Build spanning blocks — one per project across its quarter range
    const blocks = []; // {project, totalSprints, startQi, endQi, leftPct, widthPct, startsBeforeWindow, endsAfterWindow}
    const windowStart = qStart.getTime();
    const windowEnd = qEnd.getTime();
    for (const {project, minStart, maxEnd, ghostTrackKeys} of projectSpans.values()) {
      const totalSprints = maxEnd - minStart;
      const projStartMs = sprintStartDate.getTime() + minStart * sprintWeeks * 7 * 86400000;
      const projEndMs = sprintStartDate.getTime() + maxEnd * sprintWeeks * 7 * 86400000;
      // Skip projects entirely outside the 4-quarter window
      if (projEndMs <= windowStart || projStartMs >= windowEnd) continue;
      // Clamp to window
      const clampedStart = Math.max(projStartMs, windowStart);
      const clampedEnd = Math.min(projEndMs, windowEnd);
      // Determine which quarters the project spans
      let startQi = -1, endQi = -1;
      for (let qi = 0; qi < 4; qi++) {
        const qs = quarters[qi].start.getTime(), qe = quarters[qi].end.getTime();
        if (clampedStart < qe && clampedEnd > qs) {
          if (startQi === -1) startQi = qi;
          endQi = qi;
        }
      }
      if (startQi === -1) continue;
      // Compute left% and width% relative to the spanned quarter columns
      // The block will use gridColumn: (startQi+1) / (endQi+2), so left/width are relative to that span
      const spanStartMs = quarters[startQi].start.getTime();
      const spanEndMs = quarters[endQi].end.getTime();
      const spanMs = spanEndMs - spanStartMs;
      const leftPct = Math.max(0, (clampedStart - spanStartMs) / spanMs * 100);
      const rightPct = Math.max(0, (spanEndMs - clampedEnd) / spanMs * 100);
      const widthPct = 100 - leftPct - rightPct;

      // Count projects per quarter for the header count
      for (let qi = startQi; qi <= endQi; qi++) quarters[qi].projects.push(project);

      // Global position within the 4-quarter window (for bin-packing overlap checks)
      const globalLeft = (clampedStart - windowStart) / (windowEnd - windowStart) * 100;
      const globalRight = (clampedEnd - windowStart) / (windowEnd - windowStart) * 100;

      blocks.push({
        project, totalSprints, startQi, endQi, leftPct, widthPct,
        globalLeft, globalRight, ghostTrackKeys,
        startDate: new Date(projStartMs), endDate: new Date(projEndMs),
        startsBeforeWindow: projStartMs < windowStart,
        endsAfterWindow: projEndMs > windowEnd,
      });
    }

    // Sort blocks by global start position, then by size (larger first)
    blocks.sort((a, b) => {
      if (a.globalLeft !== b.globalLeft) return a.globalLeft - b.globalLeft;
      return b.totalSprints - a.totalSprints;
    });

    // Bin-pack blocks into lanes (rows) — place each block in the first lane where it fits
    const lanes = []; // each lane is an array of blocks
    for (const block of blocks) {
      let placed = false;
      for (let li = 0; li < lanes.length; li++) {
        const overlaps = lanes[li].some(b => block.globalLeft < b.globalRight && block.globalRight > b.globalLeft);
        if (!overlaps) {
          lanes[li].push(block);
          block.lane = li;
          placed = true;
          break;
        }
      }
      if (!placed) {
        block.lane = lanes.length;
        lanes.push([block]);
      }
    }

    return { quarters, blocks, laneCount: lanes.length };
  }, [filteredTimelineData, timelineConfig]);

  // ── Delivery Board data: bucket projects by end-quarter + masonry layout ──
  const deliveryData = useMemo(() => {
    const sprintWeeks = timelineConfig.sprintDurationWeeks || 2;
    const sprintStartDate = new Date(timelineConfig.sprintStartDate || Date.now());
    const GAP = 4; // px gap between tiles

    // Build 4 rolling quarters (same as quarterlyData)
    const now = new Date();
    const curQ = Math.floor(now.getMonth() / 3);
    const curYear = now.getFullYear();
    const quarters = [];
    for (let i = 0; i < 4; i++) {
      const q = (curQ + i) % 4;
      const y = curYear + Math.floor((curQ + i) / 4);
      const start = new Date(y, q * 3, 1);
      const end = new Date(y, q * 3 + 3, 0, 23, 59, 59);
      quarters.push({ label: `Q${q + 1} ${y}`, start, end });
    }
    const windowEnd = quarters[3].end.getTime();
    const windowStart = quarters[0].start.getTime();

    // 5 buckets
    const columns = quarters.map(q => ({ label: q.label, items: [] }));
    columns.push({ label: 'Later', items: [] });

    // Merge project spans from filteredTimelineData (same as quarterlyData)
    if (filteredTimelineData && filteredTimelineData.trackBars) {
      const projectSpans = new Map();
      for (const bars of Object.values(filteredTimelineData.trackBars)) {
        for (const bar of bars) {
          const pid = bar.project.id;
          const endSp = bar.startSprints + bar.sprints;
          if (!projectSpans.has(pid)) {
            projectSpans.set(pid, { project: bar.project, minStart: bar.startSprints, maxEnd: endSp });
          } else {
            const span = projectSpans.get(pid);
            span.minStart = Math.min(span.minStart, bar.startSprints);
            span.maxEnd = Math.max(span.maxEnd, endSp);
          }
        }
      }

      // Bucket each project by its end date
      // Use effort (sum of discipline sprints) for tile sizing, not timeline span
      for (const { project, minStart, maxEnd } of projectSpans.values()) {
        const effortSprints = CP.computeProjectSprints(project, sizeMap).total || 1;
        const projEndMs = sprintStartDate.getTime() + maxEnd * sprintWeeks * 7 * 86400000;
        if (projEndMs <= windowStart) continue; // already delivered
        if (projEndMs > windowEnd) {
          columns[4].items.push({ project, totalSprints: effortSprints });
          continue;
        }
        for (let qi = 0; qi < 4; qi++) {
          if (projEndMs <= quarters[qi].end.getTime() && projEndMs > quarters[qi].start.getTime()) {
            columns[qi].items.push({ project, totalSprints: effortSprints });
            break;
          }
        }
      }
    }

    // Single global scale: every sprint = same pixels everywhere, so tiles are
    // directly comparable across columns. Column height is natural (ends where tiles end).
    const allSprints = columns.reduce((s, c) => s + c.items.reduce((s2, it) => s2 + it.totalSprints, 0), 0) || 1;
    const maxColItems = Math.max(...columns.map(c => c.items.length), 1);
    // Target: busiest column fills ~550px; scale = px per sprint for a full-width tile
    const maxColSprints = Math.max(...columns.map(c => c.items.reduce((s, it) => s + it.totalSprints, 0)), 1);
    const pxPerSprint = Math.max(8, 550 / maxColSprints);

    // Sort items per column based on deliverySort
    const IMPACT_ORDER = { XXXL: 7, XXL: 6, XL: 5, L: 4, M: 3, S: 2, XS: 1 };
    for (const col of columns) {
      if (deliverySort === 'default') {
        const order = deliveryBlockOrder[col.label];
        if (order && order.length > 0) {
          col.items.sort((a, b) => {
            const aIdx = order.indexOf(String(a.project.id));
            const bIdx = order.indexOf(String(b.project.id));
            if (aIdx === -1 && bIdx === -1) return b.totalSprints - a.totalSprints;
            if (aIdx === -1) return 1;
            if (bIdx === -1) return 1;
            return aIdx - bIdx;
          });
        } else {
          col.items.sort((a, b) => b.totalSprints - a.totalSprints);
        }
      } else if (deliverySort === 'effort') {
        col.items.sort((a, b) => b.totalSprints - a.totalSprints);
      } else if (deliverySort === 'impact') {
        col.items.sort((a, b) => (IMPACT_ORDER[b.project.impact] || 0) - (IMPACT_ORDER[a.project.impact] || 0));
      } else if (deliverySort === 'name') {
        col.items.sort((a, b) => (a.project.subTask || '').localeCompare(b.project.subTask || ''));
      } else if (deliverySort === 'epic') {
        col.items.sort((a, b) => (a.project.masterEpic || '').localeCompare(b.project.masterEpic || ''));
      } else if (deliverySort === 'pillar') {
        col.items.sort((a, b) => (a.project.pillar || '').localeCompare(b.project.pillar || ''));
      }
    }

    // Masonry bin-packing per column
    for (const col of columns) {
      col.tiles = [];
      if (col.items.length === 0) { col.containerHeight = 0; continue; }

      const medianSprints = [...col.items].sort((a, b) => b.totalSprints - a.totalSprints)[Math.floor(col.items.length / 2)].totalSprints;

      // Two-column shortest-first packing
      let leftH = 0, rightH = 0;
      for (const item of col.items) {
        const isWide = col.items.length <= 2 || item.totalSprints >= medianSprints;
        let tileH, tileW, tileLeft, tileTop;

        if (isWide) {
          // Full width: height = sprints * pxPerSprint (area = width * height)
          tileW = 100;
          tileH = Math.max(48, Math.round(item.totalSprints * pxPerSprint));
          tileTop = Math.max(leftH, rightH);
          tileLeft = 0;
          leftH = tileTop + tileH + GAP;
          rightH = leftH;
        } else {
          // Half width: double height to keep same area as if it were full-width
          tileW = 50;
          tileH = Math.max(48, Math.round(item.totalSprints * pxPerSprint * 2));
          if (leftH <= rightH) {
            tileTop = leftH;
            tileLeft = 0;
            leftH = tileTop + tileH + GAP;
          } else {
            tileTop = rightH;
            tileLeft = 50;
            rightH = tileTop + tileH + GAP;
          }
        }

        col.tiles.push({
          project: item.project,
          totalSprints: item.totalSprints,
          top: tileTop,
          left: tileLeft,
          width: tileW,
          height: tileH,
          isWide,
        });
      }
      col.containerHeight = Math.max(leftH, rightH);
    }

    return { columns };
  }, [filteredTimelineData, timelineConfig, sizeMap, deliverySort, deliveryBlockOrder]);

  // Drag handlers for timeline bars (resize left/right + move with lane support)
  const handleBarDragStart = useCallback((e, bar, side) => {
    e.preventDefault();
    e.stopPropagation();
    const startX = e.clientX;
    const startY = e.clientY;
    const pxPerSprint = timelineData.pxPerSprint;
    const origLeft = bar.left;
    const origWidth = bar.width;
    const origStartSp = bar.startSprints;
    const origDurSp = bar.sprints;
    const origLaneIndex = bar.laneIndex || 0;

    const barEl = e.target.closest('.tl-bar');
    const trackBarsEl = barEl?.closest('.tl-track-bars');
    const maxLane = (trackSubLaneCounts[bar.trackKey] || 1) - 1;

    let dragStarted = false;
    const onMouseMove = (ev) => {
      const dx = ev.clientX - startX;
      const dy = ev.clientY - startY;
      // 5px threshold to distinguish click from drag
      if (!dragStarted && Math.abs(dx) < 5 && Math.abs(dy) < 5) return;
      dragStarted = true;
      const el = barEl;
      if (side === 'right') {
        const newWidth = Math.max(40, origWidth + dx);
        const newDurSp = Math.max(1, Math.round(newWidth / pxPerSprint));
        dragRef.current = { projectId: bar.project.id, trackKey: bar.trackKey, startSprints: origStartSp, durationSprints: newDurSp, laneIndex: origLaneIndex };
        if (el) { el.style.width = (newDurSp * pxPerSprint) + 'px'; }
      } else if (side === 'left') {
        const newLeft = origLeft + dx;
        const newStartSp = Math.max(0, Math.round(newLeft / pxPerSprint));
        const newDurSp = Math.max(1, origDurSp + (origStartSp - newStartSp));
        dragRef.current = { projectId: bar.project.id, trackKey: bar.trackKey, startSprints: newStartSp, durationSprints: newDurSp, laneIndex: origLaneIndex };
        if (el) { el.style.left = (newStartSp * pxPerSprint) + 'px'; el.style.width = (newDurSp * pxPerSprint) + 'px'; }
      } else { // move (horizontal + vertical lane)
        const newLeft = origLeft + dx;
        const newStartSp = Math.max(0, Math.round(newLeft / pxPerSprint));
        // Detect vertical lane from cursor position
        let newLaneIndex = origLaneIndex;
        if (trackBarsEl && maxLane > 0) {
          const rect = trackBarsEl.getBoundingClientRect();
          const relativeY = ev.clientY - rect.top;
          newLaneIndex = Math.max(0, Math.min(maxLane, Math.floor(relativeY / 54)));
        }
        dragRef.current = { projectId: bar.project.id, trackKey: bar.trackKey, startSprints: newStartSp, durationSprints: origDurSp, laneIndex: newLaneIndex };
        if (el) {
          el.style.left = (newStartSp * pxPerSprint) + 'px';
          el.style.top = (newLaneIndex * 54 + 8) + 'px';
        }
      }
    };

    const onMouseUp = () => {
      document.removeEventListener('mousemove', onMouseMove);
      document.removeEventListener('mouseup', onMouseUp);
      document.body.style.cursor = '';
      if (dragRef.current) {
        updateTimelineOverride(dragRef.current.projectId, dragRef.current.trackKey, {
          startSprints: dragRef.current.startSprints,
          durationSprints: dragRef.current.durationSprints,
        });
        // Update lane assignment if changed
        if (dragRef.current.laneIndex !== origLaneIndex) {
          updateLaneAssignment(dragRef.current.projectId, dragRef.current.trackKey, dragRef.current.laneIndex);
        }
        dragRef.current = null;
      } else if (!dragStarted) {
        // No movement — treat as click → open comments sidebar
        openCommentsSidebar(bar.project.id, bar.project.subTask, { project: bar.project, trackKey: bar.trackKey });
      }
    };

    document.body.style.cursor = side === 'move' ? 'grabbing' : 'col-resize';
    document.addEventListener('mousemove', onMouseMove);
    document.addEventListener('mouseup', onMouseUp);
  }, [timelineData.pxPerSprint, updateTimelineOverride, updateLaneAssignment, trackSubLaneCounts, openCommentsSidebar]);

  const activeV = verticals.find(v => v.key === activeVertical) || verticals[0] || BUILTIN_VERTICALS[0];
  const roadmapTotalSprints = currentData.filter(p => roadmapIds.has(p.id)).reduce((s, p) => s + projectSprints(p).total, 0);

  // ── Projects Table Component ──
  const VALID_SIZES = ['', 'XS', 'S', 'M', 'L', 'XL', 'XXL', 'XXXL'];
  const VALID_IMPACTS = ['XS', 'S', 'M', 'L', 'XL', 'XXL', 'XXXL'];

  const updateProject = (projectId, field, value) => {
    const updated = currentData.map(p => p.id === projectId ? { ...p, [field]: value } : p);
    setVerticalData(prev => ({ ...prev, [activeVertical]: updated }));
    debouncedSaveProjects(activeVertical, updated);
    setEditingCell(null);
  };

  const addProject = () => {
    const maxId = currentData.length > 0 ? Math.max(...currentData.map(p => p.id)) : 0;
    const newProject = {
      id: maxId + 1, nvrd: '', masterEpic: '', subTask: 'New Project',
      pillar: '', targetMarket: '', targetKPI: '', impact: 'M',
      backend: '', frontend: '', natives: '', inProgress: false,
      status: 'not_started', percentComplete: 0,
    };
    const updated = [...currentData, newProject];
    setVerticalData(prev => ({ ...prev, [activeVertical]: updated }));
    debouncedSaveProjects(activeVertical, updated);
    setEditingCell({ id: newProject.id, field: 'subTask' });
    setEditValue('New Project');
  };

  const fileInputRef = useRef(null);

  const handleExcelImport = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const wb = XLSX.read(evt.target.result, { type: 'array' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
        if (!rows.length) { alert('No data found in Excel file.'); return; }

        const colMap = {
          'nvrd': 'nvrd',
          'masterepic': 'masterEpic', 'epic': 'masterEpic',
          'subtask': 'subTask', 'task': 'subTask', 'name': 'subTask',
          'pillar': 'pillar',
          'targetmarket': 'targetMarket', 'market': 'targetMarket',
          'targetkpi': 'targetKPI', 'kpi': 'targetKPI',
          'impact': 'impact',
          'backend': 'backend', 'be': 'backend',
          'frontend': 'frontend', 'fe': 'frontend',
          'natives': 'natives', 'native': 'natives', 'mobile': 'natives',
          'inprogress': 'inProgress', 'progress': 'inProgress',
          'status': 'status',
          'percentcomplete': 'percentComplete', 'percent': 'percentComplete', 'complete': 'percentComplete',
          'backendsprints': '_ovBackend', 'besprints': '_ovBackend',
          'frontendsprints': '_ovFrontend', 'fesprints': '_ovFrontend',
          'nativessprints': '_ovNatives', 'nativesprints': '_ovNatives',
        };

        const normalize = (s) => s.trim().toLowerCase().replace(/[^a-z0-9]/g, '');

        const headerMap = {};
        Object.keys(rows[0]).forEach(h => {
          const key = normalize(h);
          if (colMap[key]) headerMap[h] = colMap[key];
        });

        // Parse each row's values using headerMap
        const parseRow = (row) => {
          const vals = {};
          Object.entries(headerMap).forEach(([excelCol, field]) => {
            let val = String(row[excelCol] ?? '').trim();
            if (field === 'inProgress') {
              vals[field] = ['true', 'yes', '1', 'x'].includes(val.toLowerCase());
            } else if (field === 'status') {
              const lower = val.toLowerCase();
              if (['in_progress', 'inprogress', 'in progress', 'started'].includes(lower)) vals[field] = 'in_progress';
              else if (['paused', 'on hold', 'hold'].includes(lower)) vals[field] = 'paused';
              else vals[field] = 'not_started';
            } else if (field === 'percentComplete') {
              vals[field] = Math.max(0, Math.min(100, parseInt(val) || 0));
            } else if (['backend', 'frontend', 'natives'].includes(field)) {
              const upper = val.toUpperCase();
              vals[field] = VALID_SIZES.includes(upper) ? upper : '';
            } else if (field === 'impact') {
              const upper = val.toUpperCase();
              vals[field] = VALID_IMPACTS.includes(upper) ? upper : 'M';
            } else if (field.startsWith('_ov')) {
              const num = parseFloat(val);
              if (!isNaN(num) && num >= 0) vals[field] = num;
            } else {
              vals[field] = val;
            }
          });
          // Build sprintOverrides from _ov fields
          const overrides = {};
          if (vals._ovBackend != null) { overrides.backend = vals._ovBackend; delete vals._ovBackend; }
          if (vals._ovFrontend != null) { overrides.frontend = vals._ovFrontend; delete vals._ovFrontend; }
          if (vals._ovNatives != null) { overrides.natives = vals._ovNatives; delete vals._ovNatives; }
          if (Object.keys(overrides).length > 0) vals.sprintOverrides = overrides;
          return vals;
        };

        // Build lookups: by NVRD (primary) and by epic+subTask (fallback)
        const existingByNvrd = {};
        const existingByName = {};
        currentData.forEach(p => {
          const nvrd = (p.nvrd || '').trim().toUpperCase();
          if (nvrd) existingByNvrd[nvrd] = p.id;
          const key = (p.masterEpic || '').trim().toLowerCase() + '||' + (p.subTask || '').trim().toLowerCase();
          if (key !== '||') existingByName[key] = p.id;
        });

        let maxId = currentData.length > 0 ? Math.max(...currentData.map(p => p.id)) : 0;
        let updatedCount = 0, addedCount = 0;
        const newProjects = [];
        const updateMap = {}; // id -> fields to update

        rows.forEach(row => {
          const vals = parseRow(row);

          // Match by NVRD first (reliable Jira ID), then fall back to epic+subTask
          let matchedId = null;
          const nvrd = (vals.nvrd || '').trim().toUpperCase();
          if (nvrd && existingByNvrd[nvrd] !== undefined) {
            matchedId = existingByNvrd[nvrd];
          } else {
            const epic = (vals.masterEpic || '').trim().toLowerCase();
            const sub = (vals.subTask || '').trim().toLowerCase();
            const matchKey = epic + '||' + sub;
            if (matchKey !== '||' && existingByName[matchKey] !== undefined) {
              matchedId = existingByName[matchKey];
            }
          }

          if (matchedId !== null) {
            // Existing project — update values but keep id and swimlane assignments intact
            updateMap[matchedId] = vals;
            updatedCount++;
          } else {
            // New project
            maxId++;
            newProjects.push({
              id: maxId, nvrd: '', masterEpic: '', subTask: '',
              pillar: '', targetMarket: '', targetKPI: '', impact: 'M',
              backend: '', frontend: '', natives: '', inProgress: false,
              status: 'not_started', percentComplete: 0,
              ...vals,
            });
            addedCount++;
          }
        });

        // Apply updates to existing projects (keeps their id and position)
        const merged = currentData.map(p => {
          if (updateMap[p.id]) {
            return { ...p, ...updateMap[p.id] };
          }
          return p;
        });
        // Append new projects at end
        const updated = [...merged, ...newProjects];
        setVerticalData(prev => ({ ...prev, [activeVertical]: updated }));
        saveProjects(activeVertical, updated);

        const parts = [];
        if (addedCount) parts.push(`${addedCount} added`);
        if (updatedCount) parts.push(`${updatedCount} updated`);
        setSaveStatus({ type: 'ok', msg: parts.length ? parts.join(', ') : 'No changes' });
        setTimeout(() => setSaveStatus(null), 4000);
      } catch (err) {
        alert('Failed to parse Excel file: ' + err.message);
      }
    };
    reader.readAsArrayBuffer(file);
    e.target.value = '';
  };

  // ── Export: Projects as Excel ──
  const exportProjectsExcel = () => {
    const exportCols = ['nvrd', 'masterEpic', 'subTask', 'pillar', 'targetMarket', 'targetKPI', 'impact', 'backend', 'frontend', 'natives', 'status', 'percentComplete'];
    const rows = currentData.map(p => {
      const row = {};
      for (const col of exportCols) row[col] = p[col] ?? '';
      // Add sprint override columns
      const ov = p.sprintOverrides || {};
      row['backendSprints'] = ov.backend ?? '';
      row['frontendSprints'] = ov.frontend ?? '';
      row['nativesSprints'] = ov.natives ?? '';
      return row;
    });
    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Projects');
    const date = new Date().toISOString().slice(0, 10);
    XLSX.writeFile(wb, `${activeVertical}_${date}_projects.xlsx`);
  };

  // ── Export: Full Backup as JSON ──
  const exportFullBackup = () => {
    const state = verticalStates[activeVertical];
    const cleanState = {};
    for (const f of STATE_FIELD_NAMES) {
      if (state[f] !== undefined) cleanState[f] = state[f];
    }
    const backup = {
      version: 1,
      vertical: activeVertical,
      exportedAt: new Date().toISOString(),
      exportedBy: authUser.email,
      state: cleanState,
      projects: currentData,
    };
    const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const date = new Date().toISOString().slice(0, 10);
    a.download = `${activeVertical}_${date}_full_backup.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  // ── Import: Full Backup from JSON ──
  const backupInputRef = useRef(null);
  const handleBackupImport = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    e.target.value = '';
    try {
      const text = await file.text();
      const backup = JSON.parse(text);
      if (!backup.version || !backup.state || !Array.isArray(backup.projects)) {
        alert('Invalid backup file. Must contain version, state, and projects.');
        return;
      }
      const count = backup.projects.length;
      const source = backup.vertical ? ` (from "${backup.vertical}")` : '';
      const date = backup.exportedAt ? ` exported ${new Date(backup.exportedAt).toLocaleDateString()}` : '';
      if (!window.confirm(`Restore full backup${source}${date}?\n\nThis will replace ALL ${currentData.length} current projects and the entire state for "${activeVertical}" with ${count} projects from the backup.\n\nThis cannot be undone.`)) return;
      // Save projects
      const projRes = await fetch(`${API_URL}/api/verticals/${encodeURIComponent(activeVertical)}/projects`, {
        method: 'POST', headers: getAuthHeaders(),
        body: JSON.stringify({ projects: backup.projects }),
      });
      if (!projRes.ok) { alert('Failed to restore projects: ' + ((await projRes.json()).error || projRes.status)); return; }
      // Save state — send all fields with _loadedAt: 0 to force overwrite
      const statePayload = { _loadedAt: 0 };
      for (const f of STATE_FIELD_NAMES) {
        if (backup.state[f] !== undefined) statePayload[f] = backup.state[f];
      }
      const stateRes = await fetch(`${API_URL}/api/verticals/${encodeURIComponent(activeVertical)}/state`, {
        method: 'POST', headers: getAuthHeaders(),
        body: JSON.stringify(statePayload),
      });
      if (!stateRes.ok) { alert('Failed to restore state: ' + ((await stateRes.json()).error || stateRes.status)); return; }
      // Reload vertical to reflect changes
      setLoading(true);
      await loadVertical(activeVertical);
      setLoading(false);
      setSaveStatus({ type: 'ok', msg: `Restored ${count} projects from backup` });
      setTimeout(() => setSaveStatus(null), 4000);
    } catch (err) {
      alert('Failed to parse backup file: ' + err.message);
    }
  };

  // ── Export/Import dropdown state ──
  const [showExportMenu, setShowExportMenu] = useState(false);
  const [showImportMenu, setShowImportMenu] = useState(false);
  const exportMenuRef = useRef(null);
  const importMenuRef = useRef(null);
  // ── User menu dropdown ──
  const [showUserMenu, setShowUserMenu] = useState(false);
  const userMenuRef = useRef(null);
  useEffect(() => {
    const handler = (e) => {
      if (exportMenuRef.current && !exportMenuRef.current.contains(e.target)) setShowExportMenu(false);
      if (importMenuRef.current && !importMenuRef.current.contains(e.target)) setShowImportMenu(false);
      if (userMenuRef.current && !userMenuRef.current.contains(e.target)) setShowUserMenu(false);
    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  const deleteProject = (projectId) => {
    if (!window.confirm('Delete this project?')) return;
    const updated = currentData.filter(p => p.id !== projectId);
    setVerticalData(prev => ({ ...prev, [activeVertical]: updated }));
    setTracks(prev => removeFromTracks(prev, projectId));
    // Save immediately — no debounce for deletes
    saveProjects(activeVertical, updated);
  };

  // ── Bulk operations ──
  const toggleSelect = (id) => {
    setSelectedIds(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  };

  const toggleSelectAll = () => {
    if (selectedIds.size === currentData.length) {
      setSelectedIds(new Set());
    } else {
      setSelectedIds(new Set(currentData.map(p => p.id)));
    }
  };

  const bulkDelete = () => {
    if (selectedIds.size === 0) return;
    if (!window.confirm(`Delete ${selectedIds.size} selected project${selectedIds.size > 1 ? 's' : ''}?`)) return;
    const updated = currentData.filter(p => !selectedIds.has(p.id));
    setVerticalData(prev => ({ ...prev, [activeVertical]: updated }));
    setTracks(prev => {
      let t = prev;
      for (const id of selectedIds) t = removeFromTracks(t, id);
      return t;
    });
    // Save immediately — no debounce for deletes
    saveProjects(activeVertical, updated);
    setSelectedIds(new Set());
  };

  const bulkEdit = () => {
    if (selectedIds.size === 0 || !bulkField) return;
    const updated = currentData.map(p =>
      selectedIds.has(p.id) ? { ...p, [bulkField]: bulkValue } : p
    );
    setVerticalData(prev => ({ ...prev, [activeVertical]: updated }));
    debouncedSaveProjects(activeVertical, updated);
  };

  const BULK_FIELD_OPTIONS = [
    { key: 'pillar', label: 'Pillar' },
    { key: 'targetMarket', label: 'Market' },
    { key: 'targetKPI', label: 'KPI' },
    { key: 'impact', label: 'Impact' },
    { key: 'backend', label: 'Backend' },
    { key: 'frontend', label: 'Frontend' },
    { key: 'natives', label: 'Natives' },
    { key: 'masterEpic', label: 'Epic' },
  ];

  const sizeFields = new Set(['impact', 'backend', 'frontend', 'natives']);

  const startEdit = (id, field, value) => {
    setEditingCell({ id, field });
    setEditValue(value || '');
  };

  const commitEditRef = useRef(null);
  commitEditRef.current = () => {
    if (editingCell) {
      updateProject(editingCell.id, editingCell.field, editValue);
    }
  };
  const commitEdit = () => commitEditRef.current();

  const dropdownFields = { impact: VALID_IMPACTS, backend: VALID_SIZES, frontend: VALID_SIZES, natives: VALID_SIZES };

  const renderEditableCell = (p, field) => {
    const value = p[field] || '';
    if (!isEditor) return <div className="cell-view" style={{cursor:'default'}}>{value || '—'}</div>;
    const isEditing = editingCell?.id === p.id && editingCell?.field === field;

    if (isEditing) {
      if (dropdownFields[field]) {
        return (
          <select className="cell-select" value={editValue}
            onChange={(e) => { updateProject(p.id, field, e.target.value); }}
            onBlur={() => setEditingCell(null)}
            onKeyDown={(e) => { if (e.key === 'Escape') setEditingCell(null); }}
            autoFocus>
            {dropdownFields[field].map(v => <option key={v} value={v}>{v || '—'}</option>)}
          </select>
        );
      }
      return (
        <input className="cell-input" value={editValue}
          onChange={(e) => setEditValue(e.target.value)}
          onBlur={commitEdit}
          onKeyDown={(e) => {
            if (e.key === 'Enter') commitEdit();
            if (e.key === 'Escape') setEditingCell(null);
          }}
          autoFocus />
      );
    }
    const overrideVal = (p.sprintOverrides || {})[field];
    const hasOverride = overrideVal != null && ['backend', 'frontend', 'natives'].includes(field);
    return (
      <div className="cell-view" onClick={() => startEdit(p.id, field, value)}>
        {value || '—'}
        {hasOverride && <span style={{fontSize:9, color:'var(--accent, #a29bfe)', marginLeft:2}} title={`Override: ${overrideVal}sp`}>({overrideVal}sp)</span>}
      </div>
    );
  };

  const TABLE_COLS = [
    { key: 'nvrd', label: 'NVRD', width: '8%' },
    { key: 'masterEpic', label: 'Epic', width: '13%' },
    { key: 'subTask', label: 'Sub Task', width: '23%' },
    { key: 'pillar', label: 'Pillar', width: '9%' },
    { key: 'targetMarket', label: 'Market', width: '7%' },
    { key: 'targetKPI', label: 'KPI', width: '7%' },
    { key: 'impact', label: 'Impact', width: '6%' },
    { key: 'backend', label: 'BE', width: '5%' },
    { key: 'frontend', label: 'FE', width: '5%' },
    { key: 'natives', label: 'Native', width: '5%' },
  ];

  const projectsTableJSX = (
    <div className="projects-container">

          <button className="btn btn-primary" onClick={() => { setShowImportMenu(!showImportMenu); setShowExportMenu(false); }}
            style={{background:'var(--blue)'}}>Import {IC.chevron(10)}</button>
          {showImportMenu && <div style={{position:'absolute',top:'100%',left:0,marginTop:4,background:'var(--surface1)',border:'1px solid var(--border)',borderRadius:8,boxShadow:'0 4px 16px rgba(0,0,0,0.3)',zIndex:100,minWidth:160,overflow:'hidden'}}>
            <button onClick={() => { fileInputRef.current?.click(); setShowImportMenu(false); }}
              style={{display:'block',width:'100%',padding:'8px 12px',background:'none',border:'none',color:'var(--text1)',fontSize:12,textAlign:'left',cursor:'pointer'}}
              onMouseEnter={e => e.target.style.background='var(--bg)'} onMouseLeave={e => e.target.style.background='none'}>
              Projects (Excel)
            </button>
            <button onClick={() => { backupInputRef.current?.click(); setShowImportMenu(false); }}
              style={{display:'block',width:'100%',padding:'8px 12px',background:'none',border:'none',color:'var(--text1)',fontSize:12,textAlign:'left',cursor:'pointer',borderTop:'1px solid var(--border)'}}
              onMouseEnter={e => e.target.style.background='var(--bg)'} onMouseLeave={e => e.target.style.background='none'}>
              Full Backup (JSON)
            </button>
          </div>}
          <input type="file" ref={fileInputRef} accept=".xlsx,.xls,.csv" style={{display:'none'}} onChange={handleExcelImport} />
          <input type="file" ref={backupInputRef} accept=".json" style={{display:'none'}} onChange={handleBackupImport} />
        </div>}
        {<div ref={exportMenuRef} style={{position:'relative',display:'inline-block'}}>
          <button className="btn btn-primary" onClick={() => { setShowExportMenu(!showExportMenu); setShowImportMenu(false); }}
            style={{background:'var(--green, #00b894)'}}>Export {IC.chevron(10)}</button>
          {showExportMenu && <div style={{position:'absolute',top:'100%',left:0,marginTop:4,background:'var(--surface1)',border:'1px solid var(--border)',borderRadius:8,boxShadow:'0 4px 16px rgba(0,0,0,0.3)',zIndex:100,minWidth:160,overflow:'hidden'}}>
            <button onClick={() => { exportProjectsExcel(); setShowExportMenu(false); }}
              style={{display:'block',width:'100%',padding:'8px 12px',background:'none',border:'none',color:'var(--text1)',fontSize:12,textAlign:'left',cursor:'pointer'}}
              onMouseEnter={e => e.target.style.background='var(--bg)'} onMouseLeave={e => e.target.style.background='none'}>
              Projects (Excel)
            </button>
            <button onClick={() => { exportFullBackup(); setShowExportMenu(false); }}
              style={{display:'block',width:'100%',padding:'8px 12px',background:'none',border:'none',color:'var(--text1)',fontSize:12,textAlign:'left',cursor:'pointer',borderTop:'1px solid var(--border)'}}
              onMouseEnter={e => e.target.style.background='var(--bg)'} onMouseLeave={e => e.target.style.background='none'}>
              Full Backup (JSON)
            </button>
          </div>}
        </div>}
        <span className="project-count-badge">{currentData.length} projects</span>
        {selectedIds.size > 0 && (
          <button className="btn-sm" onClick={() => setSelectedIds(new Set())} style={{marginLeft:4}}>
            Deselect all
          </button>
        )}
        {saveStatus && (
          <span style={{
            fontSize: 11, padding: '3px 10px', borderRadius: 6, fontWeight: 600,
            background: saveStatus.type === 'ok' ? 'rgba(0,184,148,0.15)' : 'rgba(225,112,85,0.15)',
            color: saveStatus.type === 'ok' ? 'var(--green)' : 'var(--red)',
          }}>{saveStatus.msg}</span>
        )}
      </div>

      {selectedIds.size > 0 && isEditor && (
        <div className="bulk-bar">
          <span className="bulk-count">{selectedIds.size} selected</span>
          <div className="bulk-sep" />
          <button className="btn-sm danger" onClick={bulkDelete}>
            Delete selected
          </button>
          <div className="bulk-sep" />
          <div className="bulk-edit-group">
            <span style={{fontSize:11, color:'var(--text2)'}}>Set</span>
            <select value={bulkField} onChange={e => { setBulkField(e.target.value); setBulkValue(''); }}>
              {BULK_FIELD_OPTIONS.map(o => <option key={o.key} value={o.key}>{o.label}</option>)}
            </select>
            <span style={{fontSize:11, color:'var(--text2)'}}>to</span>
            {sizeFields.has(bulkField) ? (
              <select value={bulkValue} onChange={e => setBulkValue(e.target.value)}>
                <option value="">— select —</option>
                {(bulkField === 'impact' ? VALID_IMPACTS : VALID_SIZES.filter(Boolean)).map(v =>
                  <option key={v} value={v}>{v}</option>
                )}
              </select>
            ) : (
              <input type="text" value={bulkValue} onChange={e => setBulkValue(e.target.value)}
                placeholder="value..." style={{width:120}} />
            )}
            <button className="btn-sm apply" onClick={bulkEdit} disabled={!bulkValue}>
              Apply
            </button>
          </div>
        </div>
      )}

      <table className="projects-table">
        <thead>
          <tr>
            {isEditor && <th className="check-col">
              <input type="checkbox" className="row-checkbox"
                checked={currentData.length > 0 && selectedIds.size === currentData.length}
                onChange={toggleSelectAll} />
            </th>}
            {TABLE_COLS.map(c => <th key={c.key} style={{width:c.width}}>{c.label}</th>)}
            {isEditor && <th style={{width:'5%'}}></th>}
          </tr>
        </thead>
        <tbody>
          {currentData.map((p, i) => (
            <tr key={p.id} className={`${editingCell?.id === p.id ? 'editing-row' : ''} ${selectedIds.has(p.id) ? 'editing-row' : ''}`}>
              {isEditor && <td className="check-col">
                <input type="checkbox" className="row-checkbox"
                  checked={selectedIds.has(p.id)}
                  onChange={() => toggleSelect(p.id)} />
              </td>}
              {TABLE_COLS.map(c => <td key={c.key}>{renderEditableCell(p, c.key)}</td>)}
              {isEditor && <td>
                <button className="btn-icon danger" onClick={() => deleteProject(p.id)} title="Delete project">
                  ×
                </button>
              </td>}
            </tr>
          ))}
          {isEditor && (
            <tr>
              <td colSpan={TABLE_COLS.length + 2} style={{padding:0, borderTop:'1px solid var(--border)'}}>
                <button onClick={addProject} style={{width:'100%', padding:'10px', background:'none', border:'none', color:'var(--text2)', fontSize:12, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:6, transition:'all 0.15s'}}
                  onMouseEnter={e => { e.target.style.background='rgba(124,108,240,0.08)'; e.target.style.color='var(--accent1)'; }}
                  onMouseLeave={e => { e.target.style.background='none'; e.target.style.color='var(--text2)'; }}>
                  <span style={{fontSize:16, fontWeight:600}}>+</span> Add Project
                </button>
              </td>
            </tr>
          )}
        </tbody>
      </table>
      {currentData.length === 0 && (
        <div style={{textAlign:'center', padding:'60px 40px', color:'var(--text2)'}}>
          <p style={{fontSize:16, marginBottom:12}}>No projects yet</p>
          <p style={{fontSize:13}}>Click <strong>"+ Add Project"</strong> to create your first project.</p>
        </div>
      )}
    </div>
  );

  const renderTooltip = () => {
    if (!tooltip) return null;
    const { p, x, y, trackKey: ttTrackKey } = tooltip;
    const s = projectSprints(p);
    const eff = effectiveSprints(p);
    const hasSplit = splits[p.id] && Object.keys(splits[p.id]).length > 0;
    // Overcapacity info
    const overDisc = ttTrackKey && trackOverflow[ttTrackKey] && trackOverflow[ttTrackKey][p.id];
    const tc = ttTrackKey && effectiveTrackCapacity[ttTrackKey];
    const tu = ttTrackKey && trackUsed[ttTrackKey];
    // Keep tooltip on screen
    const tx = Math.min(x, window.innerWidth - 300);
    const ty = Math.min(y, window.innerHeight - 160);
    return (
      <div className="tooltip-overlay" style={{ left: tx, top: ty }}>
        <div className="tooltip-card">
          <div className="tt-title">{p.subTask}</div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
            <span style={{fontSize:12,fontWeight:700,color:'var(--accent2)'}}>{hasSplit ? `${eff.total}/${s.total}` : s.total} sprints</span>
            {CP.getProjectStatus(p) !== 'not_started' && (
              <span style={{fontSize:10,color: CP.getProjectStatus(p) === 'paused' ? '#fdcb6e' : 'var(--green)',fontWeight:600}}>
                {CP.getProjectStatus(p) === 'in_progress' ? '● In Progress' : '⏸ Paused'}
                {CP.getPercentComplete(p) > 0 && ` ${CP.getPercentComplete(p)}%`}
              </span>
            )}
          </div>
          {overDisc && overDisc.length > 0 && tc && tu && (
            <div style={{marginTop:4,padding:'6px 8px',background:'rgba(225,112,85,0.1)',border:'1px solid rgba(225,112,85,0.2)',borderRadius:8}}>
              <div style={{fontSize:10,fontWeight:700,color:'var(--red)',marginBottom:3}}>⚠ Over capacity</div>
              {overDisc.map(d => {
                const label = d === 'backend' ? 'Backend' : d === 'frontend' ? 'Frontend' : 'Natives';
                const used = tu[d] || 0;
                const cap = tc[d] || 0;
                return (
                  <div key={d} style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'var(--text)',padding:'1px 0'}}>
                    <span>{label}: {Math.round(used*10)/10}/{cap} SP</span>
                    <span style={{color:'var(--red)',fontWeight:700}}>+{Math.round((used-cap)*10)/10} over</span>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>
    );
  };

  return (
    <>
      <div className="app-header">
        <h1>
          {activeVertical === '__executive__' ? (<>
            <span style={{color:'var(--accent)'}}>{IC.chart(14)}</span>
            {' '}Executive <span>Overview</span> <span style={{fontSize:9,color:'var(--text2)',opacity:0.5}}>v3.0</span>
          </>) : (<>
            <span style={{color: activeV.color}}>{activeV.icon}</span>
            {' '}{activeV.label} <span>Blueprint</span> <span style={{fontSize:9,color:'var(--text2)',opacity:0.5}}>v3.0</span>
          </>)}
          {!isEditor && activeVertical !== '__executive__' && (
            <span style={{fontSize:10,color:'var(--blue)',fontWeight:600,marginLeft:12,display:'inline-flex',alignItems:'center',gap:6,background:'rgba(9,132,227,0.1)',padding:'1px 8px',borderRadius:4,border:'1px solid rgba(9,132,227,0.2)'}}>
              View-only
              {requestSent ? (
                <span style={{color:'#00b894',fontWeight:400,fontSize:9}}>&#10003; Request sent</span>
              ) : (
                <button onClick={async (e) => {
                  e.stopPropagation();
                  try {
                    const resp = await fetch(`${API_URL}/api/editors/request`, {
                      method: 'POST', headers: getAuthHeaders(),
                    });
                    if (!resp.ok) {
                      const data = await resp.json();
                      setSaveStatus({type:'error', msg: data.error || 'Request failed'});
                      return;
                    }
                    setRequestSent(true);
                  } catch (e) { setSaveStatus({type:'error', msg: 'Failed to send request'}); }
                }} style={{background:'none',border:'1px solid rgba(9,132,227,0.4)',borderRadius:3,padding:'0px 6px',color:'var(--blue)',fontSize:9,cursor:'pointer',fontWeight:600,lineHeight:'16px'}}>
                  Request Access
                </button>
              )}
            </span>
          )}
        </h1>
        <div className="header-right">
          {isAdmin && <button className={`notes-header-btn ${notesSidebarOpen ? 'active' : ''}`}
            onClick={() => setNotesSidebarOpen(o => !o)} title="My Notes">{IC.notes(18)}</button>}
          {activeVertical !== '__executive__' && (
            <div className="tab-switcher">
              <button className={`tab-btn ${activeTab === 'planner' ? 'active' : ''}`}
                onClick={() => setActiveTab('planner')}>Planner</button>
              <button className={`tab-btn ${activeTab === 'projects' ? 'active' : ''}`}
                onClick={() => setActiveTab('projects')}>Projects</button>
              <button className={`tab-btn ${activeTab === 'dashboard' ? 'active' : ''}`}
                onClick={() => setActiveTab('dashboard')}>Dashboard</button>
            </div>
          )}
          <div className="vertical-selector">
            <select className="vertical-select" value={activeVertical}
              onChange={e => handleVerticalChange(e.target.value)}>
              <option value="__executive__">📊 Executive</option>
              {verticals.map(v => (
                <option key={v.key} value={v.key}>{v.icon} {v.label}</option>
              ))}
            </select>
          </div>
          {/* Workspace indicator — only when on a snapshot */}
          {!isOnMasterplan && activeVertical !== '__executive__' && (
            <div style={{display:'flex',alignItems:'center',gap:0,background:'rgba(116,185,255,0.06)',border:'1px solid rgba(116,185,255,0.15)',borderRadius:9999,overflow:'hidden'}}>

                  const hasQtc = quarterKeys.some(qk => quarterlyTrackCapacity[qk] && quarterlyTrackCapacity[qk][track.key]);
                  const tc = hasQtc
                    ? quarterKeys.reduce((sum, qk) => {
                        const qtc = (quarterlyTrackCapacity[qk] && quarterlyTrackCapacity[qk][track.key]) || {};
                        for (const d of ['backend','frontend','natives']) sum[d] = (sum[d] || 0) + (qtc[d] || 0);
                        return sum;
                      }, {backend:0,frontend:0,natives:0})
                    : trackCapacity[track.key] || {backend:0,frontend:0,natives:0};
                  const tu = trackUsed[track.key] || {backend:0,frontend:0,natives:0};
                  const hasAlloc = Object.values(tc).some(v => v > 0);
                  const qOvercap = quarterlyOvercap[track.key];
                  // Compute total overcapacity per discipline
                  const totalOver = ['backend','frontend','natives'].filter(d => {
                    if (!tc[d]) return false;
                    const buffered = Math.round(tu[d] * (1 + (buffer[d] || 0) / 100) * 10) / 10;
                    return buffered > tc[d];
                  }).map(d => {
                    const label = d === 'backend' ? 'Backend' : d === 'frontend' ? 'Frontend' : 'Natives';
                    const buffered = Math.round(tu[d] * (1 + (buffer[d] || 0) / 100) * 10) / 10;
                    return { discipline: label, used: buffered, cap: tc[d], overBy: Math.round((buffered - tc[d]) * 10) / 10 };
                  });
                  return hasAlloc ? (
                    <div className="track-capacity-bar">
                      {['backend','frontend','natives'].map(d => {
                        if (!tc[d]) return null;
                        const label = d === 'backend' ? 'Backend' : d === 'frontend' ? 'Frontend' : 'Natives';
                        const buffered = Math.round(tu[d] * (1 + (buffer[d] || 0) / 100) * 10) / 10;
                        const isOver = buffered > tc[d];
                        return (
                          <span key={d} className={`track-cap-chip${isOver ? ' over' : ''}`}>
                            {label}: <strong>{buffered}</strong>/{tc[d]}

                              </div>
                            )}
                          </span>

                          const [qa, ya] = [parseInt(a[1]), parseInt(a.split(' ')[1])];
                          const [qb, yb] = [parseInt(b[1]), parseInt(b.split(' ')[1])];
                          return ya !== yb ? ya - yb : qa - qb;
                        }).map(qLabel => {
                          const qData = qOvercap[qLabel];
                          const overItems = qData.over || qData;
                          const qProjects = qData.projects || [];

                          <span key={qLabel} className="q-overcap-badge"

                                    <span className="over-amount">+{item.overBy} over</span>
                                  </div>

                                {qProjects.length > 0 && (
                                  <React.Fragment>

                                      <div style={{fontSize:10,fontWeight:600,color:'var(--text2)',marginBottom:4,textTransform:'uppercase',letterSpacing:'0.5px'}}>Projects in {qLabel.replace(/\s20/, " '")}</div>
                                      {qProjects.map((proj, idx) => {
                                        const overDKeys = overItems.map(o => o.key || o.discipline.toLowerCase());
                                        const projOverSprints = overDKeys.reduce((s, d) => s + (proj.sprints[d] || 0), 0);
                                        return (
                                          <div key={idx} style={{display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:10,padding:'2px 0',color:'var(--text)'}}>
                                            <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:160}}>{proj.isGhost ? IC.extLink(10) : null}{proj.isGhost ? ' ' : ''}{proj.name}</span>
                                            <span style={{color:'var(--yellow)',fontWeight:600,whiteSpace:'nowrap',marginLeft:8}}>{projOverSprints}sp</span>
                                          </div>
                                        );
                                      })}
                                    </div>
                                  </React.Fragment>
                                )}
                              </div>
                            )}
                          </span>
                          );
                        })}
                      </span>
                    </div>
                  ) : null;
                })()}
                <div className="track-row">
                  <div className="track-label" style={{background: track.gradient}}>
                    {track.label}
                  </div>
                  <div className="track-flow"
                    onDragOver={isEditor ? handleDragOver : undefined} onDragEnter={isEditor ? handleDragEnter : undefined}
                    onDragLeave={isEditor ? handleDragLeave : undefined}
                    onDrop={isEditor ? (e) => handleDropOnTrack(e, track.key) : undefined}
                    style={{borderColor: track.borderColor}}>
                    {(trackProjects[track.key] || []).length === 0 && (ghostsByTrack[track.key] || []).length === 0 && <div className="track-empty">Drag projects here</div>}
                    {(() => {
                      const realProjects = (trackProjects[track.key] || []).map(p => ({ type: 'real', project: p }));
                      const ghosts = (ghostsByTrack[track.key] || []).map(g => ({ type: 'ghost', project: g.project, sizing: g.sizing, homeTrack: g.homeTrack }));
                      const combined = [...realProjects, ...ghosts];
                      // Sort by stored order if available
                      const orderKey = track.key;
                      const order = trackBlockOrder[orderKey];
                      if (order && order.length > 0) {
                        combined.sort((a, b) => {
                          const aKey = a.type === 'ghost' ? `ghost:${a.project.id}` : String(a.project.id);
                          const bKey = b.type === 'ghost' ? `ghost:${b.project.id}` : String(b.project.id);
                          const aIdx = order.indexOf(aKey);
                          const bIdx = order.indexOf(bKey);
                          if (aIdx === -1 && bIdx === -1) return 0;
                          if (aIdx === -1) return 1;
                          if (bIdx === -1) return 1;
                          return aIdx - bIdx;
                        });
                      }
                      return combined.map((item, idx) => {
                        if (item.type === 'ghost') {
                          return renderGhostBlock(item.project, item.sizing, track.key, item.homeTrack, idx);
                        } else {
                          return renderBlock(item.project, 'roadmap', track.key, idx);
